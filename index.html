async function switchMarket(market) {
  state.market = market;
  state.marketId = market.id;
  // For BTC up/down: snapshot the live price as the "price to beat" on first entry into this window
  if (market.isUpDown && market.asset === 'Bitcoin') {
    fetchBtcSpot().then(p => { if (p) { state.btcStrike = p; if (!state.btcPrice) state.btcPrice = p; updateScoreboard(); } });
  }
  const [pA, pB] = market.prices;
  state.oddsA = pA; state.oddsB = pB;
  // Seed the odometer at ~40% of the final number so it spins up from "already-filling" rather than 0
  state.displayA = pA * 0.4;
  state.displayB = pB * 0.4;
  const cap = capacityFor(market.sport);
  state.targetA = Math.round(pA * cap);
  state.targetB = Math.round(pB * cap);
  state.lastA = state.targetA;
  state.lastB = state.targetB;

  let pAColor, sAColor, pBColor, sBColor;
  if (market.sport === 'crypto') {
    // Bitcoin orange both sides — distinguished by ⬆/⬇ icons + position, not by colors
    pAColor = '#f7931a'; sAColor = '#c46a00';
    pBColor = '#f7931a'; sBColor = '#c46a00';
  } else if (market.sport === 'oil') {
    // Yes (resolves) = green, No = red
    pAColor = '#00e676'; sAColor = '#00a050';
    pBColor = '#ff3b3b'; sBColor = '#8b0000';
  } else if (market.sport === 'soccer') {
    [pAColor, sAColor] = wcColorsFor(market.outcomes[0]);
    [pBColor, sBColor] = wcColorsFor(market.outcomes[1]);
  } else {
    [pAColor, sAColor] = colorsFor(market.outcomes[0]);
    [pBColor, sBColor] = colorsFor(market.outcomes[1]);
  }

  sideA.rebuildAll(); sideB.rebuildAll();
  sideA.setStyle(market.sport, pAColor, sAColor);
  sideB.setStyle(market.sport, pBColor, sBColor);

  // Color delivered by the top neon strip + its downward spotlight — frame stays chrome
  // Team identity = a subtle emissive tint on the chrome frame (anodized look). No interior color lights.
  // Frame stays pure chrome — color identity now comes from the interior RGB lights
  halfA.frameMat.emissiveIntensity = 0;
  halfB.frameMat.emissiveIntensity = 0;
  const lightColor = (hex) => {
    const c = new THREE.Color(hex);
    const hsl = {h:0,s:0,l:0}; c.getHSL(hsl);
    // Lock saturation high and clamp lightness 0.45–0.55 so neither side dominates with raw white
    return new THREE.Color().setHSL(hsl.h, Math.max(hsl.s, 0.85), Math.min(0.55, Math.max(hsl.l, 0.45)));
  };
  // Perceived-luminance scale — blue/red colors deliver less raw brightness than white/yellow,
  // so we boost dim colors and damp bright ones to keep both sides equally lit visually.
  const lumaScale = (c) => {
    const lum = 0.2126 * c.r + 0.7152 * c.g + 0.0722 * c.b;
    // target perceived lum 0.45 → scale = 0.45/lum, clamped so we don't over-shoot
    return Math.max(0.6, Math.min(2.4, 0.45 / Math.max(0.08, lum)));
  };
  const cA = lightColor(pAColor), cB = lightColor(pBColor);
  const kA = lumaScale(cA), kB = lumaScale(cB);
  const BASE_MAIN = 22, BASE_ACCENT = 10;
  if (halfA.colorLightA) { halfA.colorLightA.color.copy(cA); halfA.colorLightA.intensity = BASE_MAIN  * kA; }
  if (halfA.colorLightB) { halfA.colorLightB.color.copy(cA); halfA.colorLightB.intensity = BASE_ACCENT * kA; }
  if (halfB.colorLightA) { halfB.colorLightA.color.copy(cB); halfB.colorLightA.intensity = BASE_MAIN  * kB; }
  if (halfB.colorLightB) { halfB.colorLightB.color.copy(cB); halfB.colorLightB.intensity = BASE_ACCENT * kB; }
  if (!window.__tickerStarted) {
    window.__tickerStarted = true;
    refreshTicker();
    setInterval(() => refreshTicker(), 60000);  // breaking refresh every 60s; ticker is global across markets
  }
  // Stash colors for scoreboard reuse on poll updates
  state.colorA = typeof pAColor === 'string' ? pAColor : `#${pAColor.toString(16).padStart(6,'0')}`;
  state.colorB = typeof pBColor === 'string' ? pBColor : `#${pBColor.toString(16).padStart(6,'0')}`;
  updateScoreboard();

  // Ghost text behind the balls uses city name for NBA, raw team name otherwise
  const ghostA = market.sport === 'basketball' ? (cityForNBA(market.outcomes[0]) || market.outcomes[0]) : market.outcomes[0];
  const ghostB = market.sport === 'basketball' ? (cityForNBA(market.outcomes[1]) || market.outcomes[1]) : market.outcomes[1];
  setGhostText(ghostA, ghostB, hexToInt(pAColor), hexToInt(pBColor));
  // Country flags only on World Cup markets
  if (market.isWorldCup) {
    // Preload flags so they're cached by the time the scoreboard paints
    loadFlagImage(countryIsoFor(market.outcomes[0]), updateScoreboard);
    loadFlagImage(countryIsoFor(market.outcomes[1]), updateScoreboard);
  }
  setHud(market, pA, pB, 0, 0);

  // Initial fill — pre-seed 40% then cascade the rest
  fillInitial();

  // Odometer intro: if loader is still up, the tween starts the moment it lifts; otherwise roll now.
  if (window.__loaderDone) {
    tweenOdds(pA, pB, { duration: 1.6, ease: 'power3.out' });
  } else {
    window.__pendingIntroOdds = [pA, pB];
  }
}

  const preB = Math.floor(state.targetB * 0.4);
  const restA = state.targetA - preA;
  const restB = state.targetB - preB;
  const preSeq = shuffle([...Array(preA).fill('A'), ...Array(preB).fill('B')]);
  const restSeq = shuffle([...Array(restA).fill('A'), ...Array(restB).fill('B')]);

  // Fast pre-fill burst (8ms apart) so the box looks half-full almost immediately
  let pi = 0;
  fillIntervalId = setInterval(() => {
    if (pi >= preSeq.length) {
      clearInterval(fillIntervalId);
      // Then cascade the remainder at normal pace
      let i = 0;
      fillIntervalId = setInterval(() => {
        if (i >= restSeq.length) { clearInterval(fillIntervalId); fillIntervalId = null; return; }
        if (restSeq[i] === 'A') sideA.spawnBall(); else sideB.spawnBall();
        i++;
      }, 60);
      return;
    }
    if (preSeq[pi] === 'A') sideA.spawnBall(); else sideB.spawnBall();
    pi++;
  }, 8);
}

async function pollOdds() {
  if (!state.marketId) return;
  let prices;
  if (state.market.isUpDown) {
    const live = await fetchUpDownLive(state.market.asset);
    if (!live) return;
    if (live.id !== state.marketId) { await switchMarket(live); return; }
    prices = live.prices;
  } else if (state.market.isOilStrike) {
    prices = await fetchMarketOdds(state.marketId);
  } else if (state.market.isWorldCup) {
    const live = await fetchWorldCupLive();
    if (!live) return;
    if (live.eventId !== state.market.eventId
        || live.outcomes[0] !== state.market.outcomes[0]
        || live.outcomes[1] !== state.market.outcomes[1]) {
      await switchMarket(live); return;
    }
    prices = live.prices;
  } else if (state.market.isSoccerMatch) {
    // Re-fetch the event and recompute normalized team-Yes prices
    try {
      const r = await fetch(`${GAMMA}/events/${state.market.eventId}`);
      const ev = await r.json();
      const [teamAName, teamBName] = state.market.outcomes;
      let pa = null, pb = null;
      for (const m of (ev.markets || [])) {
        const t = extractTeamFromWinQ(m.question || '');
        if (!t) continue;
        const px = parseArr(m.outcomePrices).map(Number);
        if (px.length !== 2) continue;
        if (t === teamAName) pa = px[0];
        else if (t === teamBName) pb = px[0];
      }
      if (pa == null || pb == null) return;
      prices = [pa, pb];  // raw — bucket fill reflects actual market %
    } catch { return; }
  } else {
    prices = await fetchMarketOdds(state.marketId);
  }
  if (!prices) return;
  const [pA, pB] = prices;
  state.oddsA = pA; state.oddsB = pB;
  const cap = capacityFor(state.market.sport);
  const newA = Math.round(pA * cap);
  const newB = Math.round(pB * cap);

  const dA = newA - state.lastA;
  const dB = newB - state.lastB;

  // Apply changes
  applyDelta(sideA, trapL, dA);
  applyDelta(sideB, trapR, dB);

  state.lastA = newA;
  state.lastB = newB;

  setHud(state.market, pA, pB,
    (pA*100) - (state.market.prices[0]*100),
    (pB*100) - (state.market.prices[1]*100));
  $statusText.textContent = `Live · updated ${new Date().toLocaleTimeString()}`;
  tweenOdds(pA, pB, { duration: 0.9, ease: 'power2.out' });

}

// Cycle coins on each side: drop new ones in from above, silently retire the oldest already at rest.
// Doesn't touch the trapdoor (which drains the whole pile via gravity).
function churnBtc() {
  for (const side of [sideA, sideB]) {
    if (side.balls.length < 4) continue;
    const churn = 4;
    // Pick the bottom-most resting coins (lowest y) and queue them for silent removal
    const resting = side.balls
      .map((b, i) => ({ b, i, y: b.body.translation().y }))
      .filter(o => Math.abs(o.b.body.linvel().y) < 0.1) // already settled
      .sort((a, c) => a.y - c.y)
      .slice(0, churn);
    // Spawn new coins from the top first (so total temporarily exceeds target during cascade)
    for (let k = 0; k < churn; k++) setTimeout(() => side.spawnBall(), k * 110);
    // Despawn the old ones after the new ones have time to land
    setTimeout(() => {
      for (const o of resting) {
        const idx = side.balls.indexOf(o.b);
        if (idx === -1) continue;
        side.balls.splice(idx, 1);
        scene.remove(o.b.mesh); disposeBallMesh(o.b.mesh);
        world.removeRigidBody(o.b.body);
      }
    }, 1400);
  }
}

function applyDelta(side, trap, delta) {
  if (delta > 0) {
    // Add balls
    let added = 0;
    const adder = setInterval(() => {
      if (added >= delta) { clearInterval(adder); return; }
      side.spawnBall(); added++;
    }, 80);
  } else if (delta < 0) {
    // Open long enough for gravity to actually drop the balls
    trap.open(2500);
    // Pre-select the LOWEST |delta| balls and nudge them so they're the ones that fall through.
    // Then after the trap cycle, remove EXACTLY |delta| balls — no over/under drop.
    const drop = Math.min(side.balls.length, -delta);
    const sorted = [...side.balls].sort((a, b) => a.body.translation().y - b.body.translation().y);
    const fallen = sorted.slice(0, drop);
    // Small downward impulse on the chosen balls so they're the first to find the hole
    for (const b of fallen) {
      try { b.body.applyImpulse({ x: 0, y: -3, z: 0 }, true); } catch {}
    }
    setTimeout(() => {
      // Remove exactly the pre-selected fallen balls
      const fallenSet = new Set(fallen);
      for (let i = side.balls.length - 1; i >= 0; i--) {
        if (fallenSet.has(side.balls[i])) {
          const b = side.balls[i];
          scene.remove(b.mesh);
          disposeBallMesh(b.mesh);
          world.removeRigidBody(b.body);
          side.balls.splice(i, 1);
        }
      }
    }, 2400);
  }
}

// ─────────────────────────────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function loop() {
  const dt = Math.min(0.033, clock.getDelta());
  // Physics step
  world.step(eventQueue);
  // Trapdoors
  trapL.update(dt);
  trapR.update(dt);
  // Sync ball meshes
  const spawnRate = dt * 12; // 1/0.083s → ~80ms tween, near-instant
  for (const side of [sideA, sideB]) {
    for (const b of side.balls) {
      const t = b.body.translation();
      const r = b.body.rotation();
      b.mesh.position.set(t.x, t.y, t.z);
      b.mesh.quaternion.set(r.x, r.y, r.z, r.w);
      // Spawn-in scale tween (ease-out cubic)
      const ud = b.mesh.userData;
      if (ud.spawnT !== undefined && ud.spawnT < 1) {
        ud.spawnT = Math.min(1, ud.spawnT + spawnRate);
        const e = 1 - Math.pow(1 - ud.spawnT, 3);
        b.mesh.scale.setScalar(ud.targetScale * (0.01 + 0.99 * e));
      }
    }
    side.cleanupFallen();
  }
  // Camera tween (locked angles) — skipped when OrbitControls is driving
  if (!window.__orbit) {
    if (camTweenT < 1) {
      camTweenT = Math.min(1, camTweenT + dt * 1.6);
      const e = camTweenT < 0.5 ? 2 * camTweenT * camTweenT : 1 - Math.pow(-2 * camTweenT + 2, 2) / 2;
      camera.position.lerpVectors(camFromPos, camToPos, e);
    }
    camera.lookAt(activeTarget());
  }
  // Ticker scroll — each wall blits its own slice of the master canvas at a perimeter offset.
  // The marquee wraps continuously around the room (back → right → front → left).
  if (tickerMasterCanvas && tickerMeshes.length && tickerMeshes[0].visibleCanvas) {
    const src = tickerMasterCanvas;
    const speedWorldPerSec = 5.5;    // slow enough to read
    const perimeter = tickerMeshes[0]._perimeterTotal || 1;
    // Convert master canvas pixels per world unit so wall lengths map cleanly
    const pxPerWorld = src.width / perimeter;
    const globalOffset = (performance.now() * speedWorldPerSec / 1000) % perimeter;
    for (const tk of tickerMeshes) {
      const dst = tk.visibleCanvas;
      const dctx = dst.getContext('2d');
      const startPx = ((globalOffset + tk.perimeterOffset) * pxPerWorld) % src.width;
      const sliceW = tk.width * pxPerWorld;
      dctx.fillStyle = '#040608';
      dctx.fillRect(0, 0, dst.width, dst.height);
      if (startPx + sliceW <= src.width) {
        dctx.drawImage(src, startPx, 0, sliceW, src.height, 0, 0, dst.width, dst.height);
      } else {
        const first = src.width - startPx;
        const firstDst = (first / sliceW) * dst.width;
        dctx.drawImage(src, startPx, 0, first, src.height, 0, 0, firstDst, dst.height);
        dctx.drawImage(src, 0, 0, sliceW - first, src.height, firstDst, 0, dst.width - firstDst, dst.height);
      }
      if (tk.tex) tk.tex.needsUpdate = true;
    }
  }
  composer.render();
  requestAnimationFrame(loop);
}

// ── Real GSAP loader — tied to loading milestones, exits after first market is ready
const loader = (() => {
  if (typeof gsap === 'undefined') return { progress: () => {}, finish: () => { document.getElementById('loading').remove(); } };
  if (gsap.registerPlugin && typeof CustomEase !== 'undefined') gsap.registerPlugin(CustomEase, SplitText);
  if (typeof CustomEase !== 'undefined') CustomEase.create('loader', '0.65, 0.01, 0.05, 0.99');

  const wrap = document.querySelector('[data-load-wrap]');
  const bg = wrap.querySelector('[data-load-bg]');
  const progressBar = wrap.querySelector('[data-load-progress]');
  const logo = wrap.querySelector('[data-load-logo]');
  const container = wrap.querySelector('[data-load-container]');
  const textElements = Array.from(wrap.querySelectorAll('[data-load-text]'));
  const resetTargets = Array.from(wrap.querySelectorAll('[data-load-reset]:not([data-load-text])'));
  if (resetTargets.length) gsap.set(resetTargets, { autoAlpha: 1 });

  // Text cycle (split chars in/out) — paced so each label dwells long enough to read
  let firstWord, secondWord;
  let firstReadyAt = 0;          // timestamp when first text finished animating IN
  let secondReadyAt = 0;
  let switchedText = false;
  let secondShownAt = 0;
  const MIN_FIRST_DWELL = 900;   // ms first text stays fully visible before swap
  const MIN_SECOND_DWELL = 700;  // ms second text stays fully visible before exit
  if (textElements.length >= 2 && typeof SplitText !== 'undefined') {
    firstWord = new SplitText(textElements[0], { type: 'lines,chars', mask: 'lines' });
    secondWord = new SplitText(textElements[1], { type: 'lines,chars', mask: 'lines' });
    gsap.set([firstWord.chars, secondWord.chars], { autoAlpha: 0, yPercent: 125 });
    gsap.set(textElements, { autoAlpha: 1 });
    gsap.to(firstWord.chars, {
      autoAlpha: 1, yPercent: 0, duration: 0.4, stagger: { each: 0.02 }, ease: 'loader',
      onComplete() { firstReadyAt = performance.now(); maybeSwapText(); },
    });
  }

  let currentProgress = 0;
  let pendingSwapTimer = null;
  function maybeSwapText() {
    if (switchedText || !firstWord || !secondWord) return;
    if (currentProgress < 0.5) return;
    if (firstReadyAt === 0) return;       // first text still animating in — wait for onComplete
    const dwell = performance.now() - firstReadyAt;
    if (dwell < MIN_FIRST_DWELL) {
      if (pendingSwapTimer) clearTimeout(pendingSwapTimer);
      pendingSwapTimer = setTimeout(maybeSwapText, MIN_FIRST_DWELL - dwell + 30);
      return;
    }
    switchedText = true;
    gsap.to(firstWord.chars, { autoAlpha: 0, yPercent: -125, duration: 0.3, stagger: { each: 0.015 }, ease: 'loader' });
    gsap.to(secondWord.chars, {
      autoAlpha: 1, yPercent: 0, duration: 0.4, stagger: { each: 0.02 }, ease: 'loader',
      onComplete() { secondReadyAt = performance.now(); },
    }, '<0.15');
  }

  function progress(p) {
    const v = Math.max(currentProgress, Math.min(1, p));
    currentProgress = v;
    gsap.to(progressBar, { scaleX: v, duration: 0.4, ease: 'loader' });
    if (v >= 0.5) maybeSwapText();
  }

  function finish() {
    // Defer exit until the second text has been on screen long enough to read
    if (secondWord && switchedText) {
      if (secondReadyAt === 0) { setTimeout(finish, 120); return; }
      const dwell = performance.now() - secondReadyAt;
      if (dwell < MIN_SECOND_DWELL) { setTimeout(finish, MIN_SECOND_DWELL - dwell + 30); return; }
    } else if (firstWord && !switchedText) {
      // Loader finished BEFORE the swap fired — give first text its dwell, then go
      if (firstReadyAt === 0) { setTimeout(finish, 120); return; }
      const dwell = performance.now() - firstReadyAt;
      if (dwell < MIN_FIRST_DWELL) { setTimeout(finish, MIN_FIRST_DWELL - dwell + 30); return; }
    }
    const tl = gsap.timeline({ defaults: { ease: 'loader' } });
    tl.to(progressBar, { scaleX: 1, duration: 0.35 });
    tl.to(logo, { clipPath: 'inset(0% 0% 0% 0%)', duration: 0.35 }, '<');
    const lastWord = switchedText ? secondWord : firstWord;
    if (lastWord) tl.to(lastWord.chars, { autoAlpha: 0, yPercent: -125, duration: 0.25, stagger: { each: 0.015 } }, '<0.05');
    tl.to(container, { autoAlpha: 0, duration: 0.3 });
    tl.to(progressBar, { scaleX: 0, transformOrigin: 'right center', duration: 0.3 }, '<');
    tl.to(bg, { yPercent: -101, duration: 0.6, onStart() {
      window.__loaderDone = true;
      const p = window.__pendingIntroOdds;
      if (p && typeof tweenOdds === 'function') {
        tweenOdds(p[0], p[1], { duration: 1.8, ease: 'power3.out' });
        window.__pendingIntroOdds = null;
      }
    } });
    tl.set(wrap, { display: 'none' });
  }
  return { progress, finish };
})();

  slider('Back fill A', 0, 3,  0.05, () => halfA.backFill.intensity, v => halfA.backFill.intensity = v);
  slider('Back fill B', 0, 3,  0.05, () => halfB.backFill.intensity, v => halfB.backFill.intensity = v);

  // ── EDGE / GLARE LIGHTS
  heading('Edge & Glare');
  slider('Front glare',  0, 20, 0.1, () => frontGlare.intensity,  v => frontGlare.intensity = v);
  slider('Side glare L', 0, 20, 0.1, () => sideGlareL.intensity,  v => sideGlareL.intensity = v);
  slider('Side glare R', 0, 20, 0.1, () => sideGlareR.intensity,  v => sideGlareR.intensity = v);
  slider('Key light',    0, 5,  0.05, () => keyLight.intensity,    v => keyLight.intensity = v);
  toggle('Animate front sweep', () => window.__sweepOn !== false, v => window.__sweepOn = v);

  // ── BACKGROUND NEON
  heading('Background Neon');
  if (window.__bluePoints) {
    slider('Blue points', 0, 60, 0.5, () => window.__bluePoints[0].intensity, v => window.__bluePoints.forEach(l => l.intensity = v));
  }
  if (window.__blueWash) {
    slider('Blue wash', 0, 2, 0.05, () => window.__blueWash.intensity, v => window.__blueWash.intensity = v);
  }
  toggle('Ghost text', () => textGroup.visible, v => textGroup.visible = v);

  // ── BLOOM
  heading('Post-Processing');
  slider('Bloom strength', 0, 2,  0.05, () => bloom.strength,  v => bloom.strength = v);
  slider('Bloom radius',   0, 2,  0.05, () => bloom.radius,    v => bloom.radius = v);
  slider('Bloom threshold',0, 1,  0.01, () => bloom.threshold, v => bloom.threshold = v);

  // ── CAMERA
  heading('Camera');
  let orbit = null;
  toggle('Free pan/spin (OrbitControls)', () => !!orbit, v => {
    if (v && !orbit) {
      orbit = new OrbitControls(camera, renderer.domElement);
      orbit.enableDamping = true;
      orbit.dampingFactor = 0.08;
      orbit.target.copy(activeTarget());
      orbit.update();
      camTweenT = 1;             // halt the locked-angle tween
      window.__orbit = orbit;
    } else if (!v && orbit) {
      orbit.dispose(); orbit = null; window.__orbit = null;
      setCamera(camIdx);         // snap back to current angle
    }
  });
  button('Reset to Front', () => { if (orbit) { orbit.dispose(); orbit = null; window.__orbit = null; } setCamera(0); });
  slider('FOV', 30, 90, 1, () => camera.fov, v => { camera.fov = v; camera.updateProjectionMatrix(); });

  // ── HOOKS
  // Patch loop's sweep into a toggle
  window.__sweepOn = true;
  // Patch frontGlare animation: if sweep disabled, freeze at center
  const origFrontPosX = frontGlare.position.x;
  // We intercept by clobbering frontGlare each frame from the existing loop. Add our own RAF watcher.
  (function watch() {
    if (window.__sweepOn === false) {
      frontGlare.position.x = 0; frontGlare.position.z = 18;
      frontGlare.lookAt(0, BOX_H * 0.5, 0);
    }
    if (window.__orbit) window.__orbit.update();
    requestAnimationFrame(watch);
  })();

  // Header
  const head = document.createElement('div');
  head.style.cssText = 'font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#888;margin-bottom:8px;';
  head.textContent = '⚙ Debug Controls';
  panel.insertBefore(head, panel.firstChild);
}
</script>
</body>
</html>
