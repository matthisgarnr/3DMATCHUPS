<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Polymarket Ballpit — Odds Visualized</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@400;600;700&family=VT323&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/CustomEase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.15/dist/SplitText.min.js"></script>
<style>
  :root {
    --bg: #050507;
    --ink: #f4f4f6;
    --dim: #6b6b75;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: 'Space Grotesk', system-ui, sans-serif; overflow: hidden; }
  #canvas { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; }

  .hud {
    position: fixed; left: 24px; top: 24px; right: 24px;
    display: flex; justify-content: space-between; align-items: flex-start;
    pointer-events: none; z-index: 10;
  }
  .pill {
    pointer-events: auto;
    background: rgba(10,10,14,0.7);
    border: 1px solid rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
    padding: 10px 14px;
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.02em;
  }
  .market-picker { display: flex; gap: 8px; align-items: center; position: relative; min-width: 340px; }
  .market-picker label { color: var(--dim); text-transform: uppercase; }
  .market-picker input {
    background: transparent; color: var(--ink); border: none; outline: none;
    font-family: inherit; font-size: 12px; flex: 1; min-width: 200px;
  }
  .market-picker input::placeholder { color: var(--dim); }
  .market-picker .chev { color: var(--dim); font-size: 9px; }
  .market-dropdown {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: rgba(10,10,14,0.92); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
    max-height: 360px; overflow-y: auto; z-index: 20;
    display: none;
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
  }
  .market-dropdown.open { display: block; }
  .market-item {
    padding: 10px 14px; cursor: pointer; color: var(--ink);
    border-bottom: 1px solid rgba(255,255,255,0.04);
    display: flex; gap: 10px; align-items: center;
  }
  .market-item:hover, .market-item.active { background: rgba(255,255,255,0.06); }
  .market-item .tag {
    color: var(--dim); font-size: 10px; letter-spacing: 0.1em;
    padding: 2px 6px; border: 1px solid rgba(255,255,255,0.15); border-radius: 4px;
    flex-shrink: 0;
  }
  .market-item .lbl { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .market-item .meta { color: var(--dim); font-size: 10px; }
  .market-group-head {
    padding: 8px 14px 4px; color: var(--dim); font-size: 9px; letter-spacing: 0.2em;
    text-transform: uppercase; pointer-events: none;
  }
  .status { color: var(--dim); }
  .status .dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: #00ff88; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .cam-bar {
    position: fixed; right: 24px; top: 24px;
    display: flex; gap: 8px; z-index: 10;
  }
  #countdown-pill { margin-top: 0; }
  .hud { align-items: flex-start; }
  .hud > .pill.status { margin-top: 56px; }
  .cam-btn {
    pointer-events: auto;
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(10,10,14,0.7);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    color: var(--dim);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color .15s, border-color .15s, transform .1s;
  }
  .cam-btn:hover { color: var(--ink); border-color: rgba(255,255,255,0.3); }
  .cam-btn.on { color: var(--ink); border-color: rgba(255,255,255,0.55); background: rgba(30,32,40,0.85); }
  .cam-btn:active { transform: scale(0.92); }

  .test-bar {
    position: fixed; left: 50%; transform: translateX(-50%); bottom: 180px;
    display: flex; gap: 40px; z-index: 10; pointer-events: none;
  }
  .test-group { display: flex; gap: 8px; pointer-events: auto; }
  .test-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(15,15,20,0.85);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--ink); font-size: 20px; font-weight: 600; line-height: 1;
    cursor: pointer; backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    transition: transform .1s, border-color .2s, background .2s;
    font-family: inherit;
  }
  .test-btn:hover { border-color: rgba(255,255,255,0.4); }
  .test-btn:active { transform: scale(0.9); }
  .test-btn.plus { color: #00ff88; }
  .test-btn.minus { color: #ff4466; }

  /* Loader — GSAP-driven logo reveal + progress bar */
  .loader { z-index: 200; color: #fff; width: 100%; height: 100dvh; position: fixed; inset: 0% 0% auto; }
  .loader__bg { background-color: #0a0a0a; width: 100%; height: 100%; position: absolute; inset: 0%; }
  .loader__container { z-index: 2; flex-flow: column; justify-content: center; align-items: center; width: 100%; height: 100%; display: flex; position: relative; }
  .loader__bg-bar { z-index: 1; transform-origin: 0%; transform-style: preserve-3d; background-color: #fff; width: 100%; height: 0.5em; position: absolute; inset: auto 0% 0%; transform: scale3d(0, 1, 1); }
  .loader__logo-wrap { justify-content: center; align-items: center; width: 14em; height: 3.4em; display: flex; position: relative; }
  .loader__logo-item { width: 100%; position: absolute; }
  .loader__logo-item.is--base { opacity: 0.2; }
  .loader__logo-item.is--top { -webkit-clip-path: inset(0% 100% 0% 0%); clip-path: inset(0% 100% 0% 0%); }
  .loader__logo-img { width: 100%; display: block; }
  .loader__text-wrap { flex-flow: column; justify-content: center; align-items: center; display: flex; position: absolute; bottom: 3.5em; }
  .loader__text-el { text-transform: uppercase; white-space: nowrap; margin-bottom: -0.25em; padding-bottom: 0.25em; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.18em; position: absolute; color: #fff; }
  [data-load-reset] { opacity: 0; }
</style>
</head>

<script type="module">
import * as THREE from 'three';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OrbitControls } from 'controls';
import { GLTFLoader } from 'gltf';
import { RectAreaLightUniformsLib } from 'ralib';
import RAPIER from 'rapier';

// ─────────────────────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────────────────────
const POLL_MS = 10000;       // odds poll interval
const BOX_W = 20;            // box width (each half = 10)
const BOX_H = 13;            // box height
const BOX_D = 9;             // box depth
const BALL_R = 0.72;         // ball radius
const WALL_T = 0.2;          // physical wall thickness (invisible)

// Volumetric capacity per side — at 100% odds the box is visually full, at 50% it's half full
// Calibrated so that at 100% odds the box fills visually to the top, at 50% to half.
const MAX_PER_SIDE = {
  basketball:  90,  // now same scale as soccer
  soccer:      90,
  crypto:     280,
  oil:         45,  // drums are big — fewer per side keeps 50% odds = ~half full
};
function capacityFor(sport) { return MAX_PER_SIDE[sport] || 100; }

const SPORT_FILTERS = [
  { tag: 'NBA', sport: 'basketball', label: 'NBA' },
];

// ─────────────────────────────────────────────────────────────────────
// THREE SETUP
// ─────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x050507, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
RectAreaLightUniformsLib.init();

const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x050507, 40, 110);

const camera = new THREE.PerspectiveCamera(46, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 4, 28);
camera.lookAt(0, 1, 0);

// LIGHTING
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
keyLight.position.set(8, 18, 14);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = -20; keyLight.shadow.camera.right = 20;
keyLight.shadow.camera.top = 20; keyLight.shadow.camera.bottom = -20;
keyLight.shadow.camera.near = 1; keyLight.shadow.camera.far = 60;
keyLight.shadow.bias = -0.0005;
scene.add(keyLight);

// Front softbox — wide horizontal bar above eye line, creates a soft band across the glass
const frontGlare = new THREE.RectAreaLight(0xffffff, 2.2, BOX_W * 1.3, BOX_H * 0.35);
frontGlare.position.set(0, BOX_H * 0.95, 22);
frontGlare.lookAt(0, BOX_H * 0.35, 0);
scene.add(frontGlare);
// Off-axis softboxes — keep the glass + metal lit with a visible reflection band
// from any of the 3 fixed camera angles (Front / Left ¾ / Right ¾), not just during transitions.
const sideGlareL = new THREE.RectAreaLight(0xffffff, 1.8, BOX_W * 0.7, BOX_H * 0.6);
sideGlareL.position.set(-22, BOX_H * 0.7, 14);
sideGlareL.lookAt(0, BOX_H * 0.35, 0);
scene.add(sideGlareL);
const sideGlareR = new THREE.RectAreaLight(0xffffff, 1.8, BOX_W * 0.7, BOX_H * 0.6);
sideGlareR.position.set( 22, BOX_H * 0.7, 14);
sideGlareR.lookAt(0, BOX_H * 0.35, 0);
scene.add(sideGlareR);
// Subtle back-fill so contents read against the dark BG without flattening
const backFill = new THREE.DirectionalLight(0xc8d4ff, 0.45);
backFill.position.set(-4, 8, -16);
scene.add(backFill);

// ENV MAP — gives glass + metal something to reflect (procedural gradient cube)
const pmrem = new THREE.PMREMGenerator(renderer);
function buildEnvScene() {
  const s = new THREE.Scene();
  // dark vignette with a few colored "studio lights"
  const back = new THREE.Mesh(
    new THREE.SphereGeometry(50, 32, 16),
    new THREE.MeshBasicMaterial({ color: 0x14181f, side: THREE.BackSide })
  );
  s.add(back);
  // Restrained env softboxes — give glass a clean horizon line, don't over-reflect
  const blobs = [
    [0x70808a, 0,  16,  8, 6],
    [0x4c5560,-14,  6,  6, 5],
    [0x4c5560, 14,  6,  6, 5],
    [0x70808a, 0,   2, 14, 6],
    [0x3a4250, 0,   2,-14, 5],
  ];
  for (const [c, x, y, z, r] of blobs) {
    const m = new THREE.Mesh(
      new THREE.SphereGeometry(r, 16, 12),
      new THREE.MeshBasicMaterial({ color: c })
    );
    m.position.set(x, y, z);
    s.add(m);
  }
  return s;
}
const envRT = pmrem.fromScene(buildEnvScene(), 0.04);
scene.environment = envRT.texture;

// LOCKED CAMERA — 3 fixed angles, tweened
const CAM_TARGET = new THREE.Vector3(0, BOX_H * 0.85, 0);
const CAM_ANGLES = [
  { name: 'Front',  pos: new THREE.Vector3(  0, 12, 38) },  // dead-front, closer
  { name: 'Left',   pos: new THREE.Vector3(-22, 12, 26) },
  { name: 'Right',  pos: new THREE.Vector3( 22, 12, 26) },
];
let camIdx = 0;
let camFromPos = camera.position.clone();
let camToPos = CAM_ANGLES[0].pos.clone();
let camTweenT = 1;
function setCamera(idx) {
  camIdx = (idx + CAM_ANGLES.length) % CAM_ANGLES.length;
  camFromPos = camera.position.clone();
  camToPos = CAM_ANGLES[camIdx].pos.clone();
  camTweenT = 0;
  document.querySelectorAll('.cam-btn').forEach((b, i) => b.classList.toggle('on', i === camIdx));
}
camera.position.copy(CAM_ANGLES[0].pos);
camera.lookAt(CAM_TARGET);

// POSTPROCESSING
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloom = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.45, 0.5, 0.9);
composer.addPass(bloom);

// ─────────────────────────────────────────────────────────────────────
// VITRINE — metallic frame + glass panels, two halves
// ─────────────────────────────────────────────────────────────────────
const boxGroup = new THREE.Group();
scene.add(boxGroup);

// Glass material — ultra-clear, no tint, light catches the surface only
// Ultra-clean glass — minimal reflection/clearcoat, just thin transmissive panes
function glassMat() {
  return new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    metalness: 0,
    roughness: 0.0,
    transmission: 1.0,
    thickness: 0.08,
    ior: 1.5,
    transparent: true,
    side: THREE.DoubleSide,
    envMapIntensity: 0.45,
  });
}

// Metallic emissive frame material (chrome + neon glow)
// Brushed chrome frame — gets a very subtle team-color emissive in switchMarket (anodized vibe)
function frameMat() {
  return new THREE.MeshStandardMaterial({
    color: 0xd8dde4,
    metalness: 1.0,
    roughness: 0.28,
    emissive: 0x000000,
    emissiveIntensity: 0.0,
  });
}

// A single frame edge as a thin rounded box
function frameEdge(length, axis, mat) {
  const t = 0.18;
  const geom = axis === 'x'
    ? new THREE.BoxGeometry(length, t, t)
    : axis === 'y'
    ? new THREE.BoxGeometry(t, length, t)
    : new THREE.BoxGeometry(t, t, length);
  const m = new THREE.Mesh(geom, mat);
  m.castShadow = true;
  return m;
}

function buildHalf(tintHex, xOffset) {
  const g = new THREE.Group();
  const w = BOX_W / 2, h = BOX_H, d = BOX_D;
  const hx = w / 2, hy = h / 2, hz = d / 2;

  const fMat = frameMat();
  const gMat = glassMat();
  // Top strip is now neutral white — color now lives on the frame edges (see ledMat below)
  const neonGeom = new THREE.BoxGeometry(w * 0.92, 0.08, 0.28);
  const neonMat = new THREE.MeshStandardMaterial({
    color: 0xffffff,
    emissive: 0xffffff,
    emissiveIntensity: 1.6,
    metalness: 0, roughness: 0.35,
    toneMapped: false,
  });
  const neon = new THREE.Mesh(neonGeom, neonMat);
  neon.position.set(0, hy + 0.1, 0);
  g.add(neon);

  // (LED strips removed for now — frame stays clean. Team identity comes from a subtle frame tint instead.)
  const ledMat = null;
  // Soft diffuse top light — large RectAreaLight covering the box's top, pointing down.
  // Stronger now to compensate for the ceiling blocking ambient and to spread color across the pile.
  // Top spot — invisible source (no rectangle artifact on back wall), pure downward illumination
  const topSpot = new THREE.SpotLight(0xfff4e0, 18, h * 3, Math.PI * 0.5, 0.95, 1.4);
  topSpot.position.set(0, hy + 1.5, 0);
  topSpot.target.position.set(0, -hy, 0);
  g.add(topSpot);
  g.add(topSpot.target);
  // Subtle directional back-fill — no visible source
  const backFill = new THREE.DirectionalLight(0xc8d4e8, 0.6);
  backFill.position.set(0, hy, -hz - 1);
  backFill.target.position.set(0, 0, hz);
  g.add(backFill);
  g.add(backFill.target);
  // Stubs so existing references don't crash
  const colorLightA = null, colorLightB = null;

  // 12 edges of the box
  // Bottom 4
  const eBN = frameEdge(w, 'x', fMat); eBN.position.set(0, -hy, -hz); g.add(eBN);
  const eBS = frameEdge(w, 'x', fMat); eBS.position.set(0, -hy,  hz); g.add(eBS);
  const eBL = frameEdge(d, 'z', fMat); eBL.position.set(-hx, -hy, 0); g.add(eBL);
  const eBR = frameEdge(d, 'z', fMat); eBR.position.set( hx, -hy, 0); g.add(eBR);
  // Top 4
  const eTN = frameEdge(w, 'x', fMat); eTN.position.set(0,  hy, -hz); g.add(eTN);
  const eTS = frameEdge(w, 'x', fMat); eTS.position.set(0,  hy,  hz); g.add(eTS);
  const eTL = frameEdge(d, 'z', fMat); eTL.position.set(-hx,  hy, 0); g.add(eTL);
  const eTR = frameEdge(d, 'z', fMat); eTR.position.set( hx,  hy, 0); g.add(eTR);
  // Verticals 4
  const eVNL = frameEdge(h, 'y', fMat); eVNL.position.set(-hx, 0, -hz); g.add(eVNL);
  const eVNR = frameEdge(h, 'y', fMat); eVNR.position.set( hx, 0, -hz); g.add(eVNR);
  const eVSL = frameEdge(h, 'y', fMat); eVSL.position.set(-hx, 0,  hz); g.add(eVSL);
  const eVSR = frameEdge(h, 'y', fMat); eVSR.position.set( hx, 0,  hz); g.add(eVSR);

  // Glass panels — back, front, left, right (no top, no bottom)
  const back  = new THREE.Mesh(new THREE.PlaneGeometry(w, h), gMat);
  back.position.set(0, 0, -hz); g.add(back);
  const front = new THREE.Mesh(new THREE.PlaneGeometry(w, h), gMat);
  front.position.set(0, 0, hz); front.rotation.y = Math.PI; g.add(front);
  const left  = new THREE.Mesh(new THREE.PlaneGeometry(d, h), gMat);
  left.position.set(-hx, 0, 0); left.rotation.y = Math.PI / 2; g.add(left);
  const right = new THREE.Mesh(new THREE.PlaneGeometry(d, h), gMat);
  right.position.set( hx, 0, 0); right.rotation.y = -Math.PI / 2; g.add(right);

  g.position.set(xOffset, h / 2, 0);
  return { group: g, frameMat: fMat, glassMat: gMat, neonMat, ledMat, colorLightA, colorLightB };
}

// FUNNEL TUBES — Apple-glass refractive cylinders above each box
// Balls spawn at the top and fall through them into the box (= smooth entry visual)
// ─────────────────────────────────────────────────────────────────────
const TUBE = { radius: 2.6, height: 14.0, segments: 48 };
const CEILING_Y = BOX_H + 0.4 + TUBE.height + 0.1;  // ceiling sits just above tube tops
const TUBE_BOTTOM_Y = BOX_H + 0.4;
const TUBE_TOP_Y = TUBE_BOTTOM_Y + TUBE.height;
const TUBE_CENTER_Y = (TUBE_BOTTOM_Y + TUBE_TOP_Y) / 2;
const TUBE_X_A = -BOX_W / 4;
const TUBE_X_B =  BOX_W / 4;

function buildTube(xCenter) {
  // Visual cylinder — open-ended Apple-glass tube
  const geom = new THREE.CylinderGeometry(TUBE.radius, TUBE.radius, TUBE.height, TUBE.segments, 1, true);
  // Tube glass — transmissive with chromatic dispersion for the rainbow refraction effect
  const mat = new THREE.MeshPhysicalMaterial({
    color: 0xffffff,
    emissive: 0xb8c8d8,
    emissiveIntensity: 0.06,
    metalness: 0,
    roughness: 0.02,
    transmission: 0.95,
    thickness: 0.45,             // thicker = more visible refraction
    ior: 1.52,
    dispersion: 1.2,             // chromatic dispersion — rainbow edges on refracted light
    transparent: true,
    side: THREE.FrontSide,
    envMapIntensity: 1.4,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.position.set(xCenter, TUBE_CENTER_Y, 0);
  scene.add(mesh);

  // Soft point light INSIDE the tube — lights the tube + falling balls from within (no spillage outside)
  const innerLight = new THREE.PointLight(0xfff4e0, 6, TUBE.height * 0.9, 1.5);
  innerLight.position.set(xCenter, TUBE_CENTER_Y, 0);
  scene.add(innerLight);

  // Polished metal rim caps at top + bottom
  const rimMat = new THREE.MeshStandardMaterial({ color: 0xe0e6ee, metalness: 1, roughness: 0.12, envMapIntensity: 1.5 });
  for (const yOff of [-TUBE.height/2 - 0.05, TUBE.height/2 + 0.05]) {
    const rim = new THREE.Mesh(
      new THREE.TorusGeometry(TUBE.radius, 0.06, 12, 48),
      rimMat
    );
    rim.position.set(xCenter, TUBE_CENTER_Y + yOff, 0);
    rim.rotation.x = Math.PI / 2;
    scene.add(rim);
  }
  // Junction: just a thin polished chrome ring flush with the ceiling — no lampshade, no socket.
  const junctionRingMat = new THREE.MeshStandardMaterial({
    color: 0xd0d8e0, metalness: 1, roughness: 0.22, envMapIntensity: 1.2,
  });
  const junction = new THREE.Mesh(
    new THREE.TorusGeometry(TUBE.radius + 0.05, 0.09, 14, 56),
    junctionRingMat
  );
  junction.position.set(xCenter, TUBE_CENTER_Y + TUBE.height/2 + 0.02, 0);
  junction.rotation.x = Math.PI / 2;
  scene.add(junction);

  // Physics: 24-segment polygonal wall. Extended ABOVE the ceiling by 3 units to catch
  // balls spawned over the ceiling and funnel them into the tube — prevents lateral escape.
  const N = 24;
  const colliderExtra = 3.0;
  const colliderHeight = TUBE.height + colliderExtra;
  const colliderCenterY = TUBE_CENTER_Y + colliderExtra / 2;
  for (let i = 0; i < N; i++) {
    const angle = (i / N) * Math.PI * 2;
    const cx = xCenter + TUBE.radius * Math.cos(angle);
    const cz = 0 + TUBE.radius * Math.sin(angle);
    const chord = 2 * TUBE.radius * Math.sin(Math.PI / N);
    const body = world.createRigidBody(
      RAPIER.RigidBodyDesc.fixed()
        .setTranslation(cx, colliderCenterY, cz)
        .setRotation((() => {
          const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,1,0), -angle - Math.PI/2);
          return { x: q.x, y: q.y, z: q.z, w: q.w };
        })())
    );
    world.createCollider(
      RAPIER.ColliderDesc.cuboid(chord / 2 * 1.02, colliderHeight / 2, 0.08)
        .setFriction(0.3).setRestitution(0.25),
      body
    );
  }
  return mesh;
}

function makeGhostText(label, color, xOffset) {
  const c = document.createElement('canvas');
  c.width = 2048; c.height = 512;
  const ctx = c.getContext('2d');
  ctx.clearRect(0, 0, c.width, c.height);
  const hex = `#${color.toString(16).padStart(6,'0')}`;
  // Auto-fit font size to canvas
  let fs = 360;
  ctx.font = `700 ${fs}px "Space Grotesk", sans-serif`;
  while (ctx.measureText(label.toUpperCase()).width > c.width - 80 && fs > 80) {
    fs -= 20; ctx.font = `700 ${fs}px "Space Grotesk", sans-serif`;
  }
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // Outer glow
  ctx.shadowColor = hex;
  ctx.shadowBlur = 60;
  ctx.lineWidth = 6;
  ctx.strokeStyle = hex;
  ctx.strokeText(label.toUpperCase(), c.width / 2, c.height / 2);
  // Inner sharper outline
  ctx.shadowBlur = 12;
  ctx.lineWidth = 3;
  ctx.strokeStyle = '#ffffff';
  ctx.globalAlpha = 0.45;
  ctx.strokeText(label.toUpperCase(), c.width / 2, c.height / 2);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  const mat = new THREE.MeshBasicMaterial({ map: tex, transparent: true, opacity: 0.95, depthWrite: false, blending: THREE.AdditiveBlending });
  const mesh = new THREE.Mesh(new THREE.PlaneGeometry(BOX_W / 2 * 0.96, BOX_W / 2 * 0.96 / 4), mat);
  mesh.position.set(xOffset, BOX_H * 0.62, -BOX_D / 2 + 0.15);
  return mesh;
}
function setGhostText(labelA, labelB, colorA, colorB) {
  if (textMeshA) { textGroup.remove(textMeshA); textMeshA.material.map.dispose(); textMeshA.material.dispose(); }
  if (textMeshB) { textGroup.remove(textMeshB); textMeshB.material.map.dispose(); textMeshB.material.dispose(); }
  textMeshA = makeGhostText(labelA, colorA, -BOX_W / 4);
  textMeshB = makeGhostText(labelB, colorB,  BOX_W / 4);
  textGroup.add(textMeshA, textMeshB);
}

function loadGLBMesh(url, opts = {}) {
  return new Promise((resolve) => {
    new GLTFLoader().load(url, (gltf) => {
      const root = gltf.scene;
      if (opts.asGroup) {
        // Multi-mesh asset (e.g. multi-panel soccer ball) — return the whole group, re-centered to origin.
        const bbox = new THREE.Box3().setFromObject(root);
        const cx = (bbox.max.x + bbox.min.x) / 2;
        const cy = (bbox.max.y + bbox.min.y) / 2;
        const cz = (bbox.max.z + bbox.min.z) / 2;
        root.traverse(o => {
          if (o.isMesh && o.geometry) {
            o.geometry.translate(-cx, -cy, -cz);
            o.geometry.computeBoundingSphere();
          }
        });
        // Compute group bounding radius for auto-scaling
        let maxR = 0;
        root.traverse(o => {
          if (o.isMesh && o.geometry?.boundingSphere) {
            const c = o.geometry.boundingSphere.center;
            const r = o.geometry.boundingSphere.radius;
            maxR = Math.max(maxR, Math.sqrt(c.x*c.x + c.y*c.y + c.z*c.z) + r);
          }
        });
        root.userData.boundingRadius = maxR;
        resolve(root);
        return;
      }
      let meshSrc = null;
      root.traverse(o => {
        if (!o.isMesh) return;
        if (opts.meshName) { if (o.name === opts.meshName) meshSrc = o; return; }
        if (!meshSrc) meshSrc = o;
      });
      if (!meshSrc) { resolve(null); return; }
      meshSrc.geometry.computeBoundingBox();
      const bb = meshSrc.geometry.boundingBox;
      const cy = (bb.max.y + bb.min.y) / 2;
      meshSrc.geometry.translate(-(bb.max.x+bb.min.x)/2, -cy, -(bb.max.z+bb.min.z)/2);
      resolve(meshSrc);
    }, undefined, (err) => { console.warn('glb load', url, err); resolve(null); });
  });
}

// Render text as a true LED dot-matrix grid — each pixel is a discrete circular dot,
// off-pixels show a dim grey dot so the grid stays visible (stadium-board look).
function dotMatrixText(text, { fontSize = 200, color = '#00ff66', cell = 8, dotRadius = 3, weight = 800, offAlpha = 0.06, letterSpacing = '-0.06em' }) {
  // Render the text into a temp canvas at native pixel sampling resolution
  const measure = document.createElement('canvas').getContext('2d');
  measure.font = `${weight} ${fontSize}px "JetBrains Mono", monospace`;
  if ('letterSpacing' in measure) measure.letterSpacing = letterSpacing;
  const textW = Math.ceil(measure.measureText(text).width);
  const padX = 8;
  const tw = textW + padX * 2;
  const th = Math.ceil(fontSize * 1.1);
  const temp = document.createElement('canvas');
  temp.width = tw; temp.height = th;
  const tctx = temp.getContext('2d');
  tctx.font = measure.font;
  if ('letterSpacing' in tctx) tctx.letterSpacing = letterSpacing;
  tctx.fillStyle = '#fff';
  tctx.textBaseline = 'middle';
  tctx.textAlign = 'left';
  tctx.fillText(text, padX, th / 2);
  const data = tctx.getImageData(0, 0, tw, th).data;

  // Quantize to dot grid
  const cols = Math.floor(tw / cell);
  const rows = Math.floor(th / cell);
  const out = document.createElement('canvas');
  out.width = cols * cell;
  out.height = rows * cell;
  const ctx = out.getContext('2d');

  // Off-dot pass first (background grid)
  ctx.fillStyle = `rgba(180, 200, 220, ${offAlpha})`;
  for (let r = 0; r < rows; r++) {
    for (let cIdx = 0; cIdx < cols; cIdx++) {
      ctx.beginPath();
      ctx.arc(cIdx * cell + cell/2, r * cell + cell/2, dotRadius * 0.85, 0, Math.PI*2);
      ctx.fill();
    }
  }
  // On-dot pass (sample the text alpha at each cell center)
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = dotRadius * 1.4;
  for (let r = 0; r < rows; r++) {
    for (let cIdx = 0; cIdx < cols; cIdx++) {
      const sx = Math.min(tw - 1, cIdx * cell + (cell >> 1));
      const sy = Math.min(th - 1, r * cell + (cell >> 1));
      const idx = (sy * tw + sx) * 4 + 3; // alpha channel
      if (data[idx] > 110) {
        ctx.beginPath();
        ctx.arc(cIdx * cell + cell/2, r * cell + cell/2, dotRadius, 0, Math.PI*2);
        ctx.fill();
      }
    }
  }
  ctx.shadowBlur = 0;
  return out;
}

  nuggets:'DEN', heat:'MIA', bucks:'MIL', mavericks:'DAL', sixers:'PHI', '76ers':'PHI',
  suns:'PHX', clippers:'LAC', timberwolves:'MIN', wolves:'MIN', pacers:'IND',
  cavaliers:'CLE', cavs:'CLE', magic:'ORL', hawks:'ATL', bulls:'CHI', rockets:'HOU',
  kings:'SAC', pelicans:'NOP', grizzlies:'MEM', jazz:'UTA', 'trail blazers':'POR',
  blazers:'POR', raptors:'TOR', pistons:'DET', wizards:'WAS', hornets:'CHA', nets:'BKN',
};
const COUNTRY_ABBR = {
  mexico:'MEX', 'south africa':'RSA', 'south korea':'KOR', 'korea republic':'KOR',
  czechia:'CZE', 'united states':'USA', usa:'USA', canada:'CAN',
  spain:'ESP', france:'FRA', england:'ENG', germany:'GER', italy:'ITA', portugal:'POR',
  netherlands:'NED', belgium:'BEL', croatia:'CRO', morocco:'MAR', japan:'JPN',
  australia:'AUS', uruguay:'URU', colombia:'COL', switzerland:'SUI', denmark:'DEN',
  senegal:'SEN', poland:'POL', iran:'IRN', ghana:'GHA', ecuador:'ECU', serbia:'SRB',
  tunisia:'TUN', wales:'WAL', qatar:'QAT', 'costa rica':'CRC', cameroon:'CMR',
  brazil:'BRA', argentina:'ARG', paraguay:'PAR', luxembourg:'LUX', gambia:'GAM',
};
function getAbbr(name) {
  if (!name) return '—';
  const k = name.toLowerCase().trim();
  if (TEAM_ABBR_NBA[k]) return TEAM_ABBR_NBA[k];
  if (COUNTRY_ABBR[k]) return COUNTRY_ABBR[k];
  for (const key of Object.keys(TEAM_ABBR_NBA)) if (k.includes(key)) return TEAM_ABBR_NBA[key];
  for (const key of Object.keys(COUNTRY_ABBR)) if (k.includes(key)) return COUNTRY_ABBR[key];
  if (k === 'up') return 'UP';
  if (k === 'down') return 'DWN';
  if (k === 'yes') return 'YES';
  if (k === 'no') return 'NO';
  const words = name.split(/\s+/).filter(Boolean);
  const w = words.reduce((a,b) => a.length >= b.length ? a : b, '');
  return (w || name).slice(0, 3).toUpperCase();
}

function paintScoreboard({ nameA, nameB, pctA, pctB, colorA, colorB, sub }) {
  const c = scoreboardCanvas;
  if (!c) return;
  const ctx = c.getContext('2d');
  const W = c.width, H = c.height;
  // 3 cells side-by-side, all dark — team identity comes from text color
  const cellW = W / 3;
  ctx.fillStyle = '#070a0e';
  ctx.fillRect(0, 0, W, H);
  // Vertical dividers
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.fillRect(cellW - 1, 28, 2, H - 56);
  ctx.fillRect(2 * cellW - 1, 28, 2, H - 56);

  // Team text uses the team color directly. For very dark colors, bump toward a brighter tint.
  const brightenIfDark = (hex) => {
    const c = new THREE.Color(hex);
    const lum = 0.2126 * c.r + 0.7152 * c.g + 0.0722 * c.b;
    if (lum < 0.18) {
      // Pull dark colors toward a brighter HSL value so dot-matrix reads
      const hsl = { h:0, s:0, l:0 }; c.getHSL(hsl);
      const out = new THREE.Color().setHSL(hsl.h, Math.max(hsl.s, 0.5), 0.65);
      return '#' + out.getHexString();
    }
    return hex;
  };
  const fgA = brightenIfDark(colorA);
  const fgB = brightenIfDark(colorB);
  const m = state.market || {};
  const isCrypto = m.sport === 'crypto';
  const labelA = isCrypto ? (nameA || 'UP').toUpperCase() : getAbbr(nameA);
  const labelB = isCrypto ? (nameB || 'DOWN').toUpperCase() : getAbbr(nameB);
  const labelFont = (labelA.length > 3 || labelB.length > 3) ? 180 : 220;
  const aAbbrCv = dotMatrixText(labelA, { fontSize: labelFont, cell: 11, dotRadius: 4.4, weight: 800, color: fgA, offAlpha: 0.06 });
  const bAbbrCv = dotMatrixText(labelB, { fontSize: labelFont, cell: 11, dotRadius: 4.4, weight: 800, color: fgB, offAlpha: 0.06 });
  const aPctCv = dotMatrixText(`${Math.round(pctA*100)}%`, { fontSize: 200, cell: 11, dotRadius: 4.2, weight: 800, color: fgA, offAlpha: 0.06 });
  const bPctCv = dotMatrixText(`${Math.round(pctB*100)}%`, { fontSize: 200, cell: 11, dotRadius: 4.2, weight: 800, color: fgB, offAlpha: 0.06 });

  const drawCenteredFit = (img, cx, cy, maxW) => {
    const s = Math.min(1, (maxW - 24) / img.width);
    ctx.drawImage(img, cx - (img.width*s)/2, cy - (img.height*s)/2, img.width*s, img.height*s);
  };
  const aStackH = aAbbrCv.height + aPctCv.height + 30;
  const aTop = H/2 - aStackH/2;
  drawCenteredFit(aAbbrCv, cellW/2, aTop + aAbbrCv.height/2, cellW);
  drawCenteredFit(aPctCv, cellW/2, aTop + aAbbrCv.height + 30 + aPctCv.height/2, cellW);
  const bStackH = bAbbrCv.height + bPctCv.height + 30;
  const bTop = H/2 - bStackH/2;
  drawCenteredFit(bAbbrCv, 5*cellW/2, bTop + bAbbrCv.height/2, cellW);
  drawCenteredFit(bPctCv, 5*cellW/2, bTop + bAbbrCv.height + 30 + bPctCv.height/2, cellW);

  // Middle cell — countdown / date
  let topLine = '', bottomLine = '';
  if (m.endDate) {
    const end = new Date(m.endDate);
    const ms = end.getTime() - Date.now();
    if (m.isUpDown && ms > 0) {
      const mm = Math.floor(ms / 60000);
      const ss = Math.floor((ms % 60000) / 1000);
      topLine = `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
      bottomLine = 'RESOLVES';
    } else if (ms > 24*3600*1000) {
      topLine = end.toLocaleDateString(undefined, { day: 'numeric', month: 'short' }).toUpperCase();
      bottomLine = end.toLocaleString(undefined, { weekday: 'short' }).toUpperCase();
    } else if (ms > 0) {
      const hh = Math.floor(ms / 3600000);
      const mm = Math.floor((ms % 3600000) / 60000);
      topLine = `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;
      bottomLine = 'TO TIPOFF';
    } else {
      topLine = 'LIVE'; bottomLine = 'NOW';
    }
  } else {
    topLine = (sub || 'VS').toUpperCase().slice(0, 8);
  }
  const midTopOpts = { fontSize: 120, cell: 7, dotRadius: 2.6, weight: 800, color: '#ffffff' };
  const midBotOpts = { fontSize: 56, cell: 4, dotRadius: 1.6, weight: 600, color: '#8a93a3' };
  const midTopCv = dotMatrixText(topLine || ' ', midTopOpts);
  const midBotCv = bottomLine ? dotMatrixText(bottomLine, midBotOpts) : null;
  const midStackH = midTopCv.height + (midBotCv ? midBotCv.height + 22 : 0);
  const midTop = H/2 - midStackH/2;
  drawCenteredFit(midTopCv, W/2, midTop + midTopCv.height/2, cellW);
  if (midBotCv) drawCenteredFit(midBotCv, W/2, midTop + midTopCv.height + 22 + midBotCv.height/2, cellW);

  if (scoreboardScreenMat?.map) scoreboardScreenMat.map.needsUpdate = true;
}

function mountScoreboard() {
  const group = new THREE.Group();

  // Body — courtside-LED stance with brushed-metal chassis
  const bodyW = 11, bodyH = 3.4, bodyD = 0.6;
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x12161e, metalness: 0.85, roughness: 0.35 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(bodyW, bodyH, bodyD), bodyMat);
  body.castShadow = true; body.receiveShadow = true;
  group.add(body);

  // Polished chrome bezel — bright, low-roughness frame
  const bezelMat = new THREE.MeshStandardMaterial({ color: 0xe6ecf2, metalness: 1.0, roughness: 0.12, envMapIntensity: 1.6 });
  const bz = 0.22;
  const front = bodyD / 2 + 0.01;
  const mkBar = (w, h, x, y) => {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, bz * 1.4), bezelMat);
    m.position.set(x, y, front);
    group.add(m);
  };
  mkBar(bodyW, bz, 0,  bodyH/2 - bz/2);
  mkBar(bodyW, bz, 0, -bodyH/2 + bz/2);
  mkBar(bz, bodyH, -bodyW/2 + bz/2, 0);
  mkBar(bz, bodyH,  bodyW/2 - bz/2, 0);
  // Corner caps for a more refined finish
  for (const [x, y] of [[-1,-1],[1,-1],[-1,1],[1,1]]) {
    const cap = new THREE.Mesh(new THREE.BoxGeometry(bz*1.4, bz*1.4, bz*1.5), bezelMat);
    cap.position.set(x * (bodyW/2 - bz/2), y * (bodyH/2 - bz/2), front);
    group.add(cap);
  }

  // Screen — main LED panel (ticker hidden for now → screen fills full height)
  const canvas = buildScoreboardCanvas();
  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  scoreboardScreenMat = new THREE.MeshBasicMaterial({ map: tex, transparent: false, toneMapped: false });
  const screenW = bodyW - bz * 2 - 0.08;
  const screenH = bodyH - bz * 2 - 0.08;
  const screen = new THREE.Mesh(new THREE.PlaneGeometry(screenW, screenH), scoreboardScreenMat);
  screen.position.set(0, 0, front + 0.04);
  group.add(screen);
  // Ticker plumbing kept in memory (tickerSourceCanvas/tickerTex used by paintTickerStrip)
  // but no plane mesh is added to the scene — easy to re-enable later by restoring this block.
  tickerSourceCanvas = document.createElement('canvas');
  tickerSourceCanvas.width = 2048; tickerSourceCanvas.height = 200;
  tickerTex = null;

  // Floor stand legs — gives the "sitting on the floor in front of the boxes" feel
  const standMat = new THREE.MeshStandardMaterial({ color: 0x2a2f3a, metalness: 0.9, roughness: 0.45 });
  for (const dx of [-bodyW * 0.35, bodyW * 0.35]) {
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.5, bodyH * 0.5, 0.5), standMat);
    leg.position.set(dx, -bodyH/2 - bodyH*0.25, 0);
    group.add(leg);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.2, 1.0), standMat);
    foot.position.set(dx, -bodyH/2 - bodyH*0.5 + 0.1, 0);
    group.add(foot);
  }

  // On the floor, in front of the boxes — feet at y=0, scoreboard well clear of boxes
  const standHalfHeight = bodyH * 0.4;
  const yCenter = bodyH/2 + standHalfHeight + 0.1;
  group.position.set(0, yCenter, BOX_D / 2 + 7);
  scene.add(group);

  if (state.market) updateScoreboard();
}

async function loadAssetsBackground() {
  const [j, s, b, c] = await Promise.all([
    loadGLBMesh('/ballpit/assets/oildrum.glb'),
    loadGLBMesh('/ballpit/assets/football.glb'),
    loadGLBMesh('/ballpit/assets/basketball.glb'),
    loadGLBMesh('/ballpit/assets/bitcoin.glb'),
  ]);
  oildrumProto = j;
  soccerProto = s;
  basketballProto = b;
  bitcoinProto = c;
  if (b) {
    b.geometry.computeBoundingSphere();
    basketballScale = (BALL_R * SIZE_MULT.basketball) / b.geometry.boundingSphere.radius;
  }
  if (s) {
    s.geometry.computeBoundingSphere();
    soccerScale = (BALL_R * SIZE_MULT.soccer) / s.geometry.boundingSphere.radius;
  }
  if (c) {
    c.geometry.computeBoundingBox();
    const bb = c.geometry.boundingBox;
    const rRaw = Math.max(bb.max.x - bb.min.x, bb.max.z - bb.min.z) / 2;
    bitcoinRadius = BALL_R * SIZE_MULT.crypto;
    bitcoinScale = bitcoinRadius / rRaw;
    bitcoinHalfHeight = (bb.max.y - bb.min.y) / 2 * bitcoinScale;
  }
  if (j) {
    // Orient drum upright (tallest axis → Y) then scale so it sits ~3 units tall in the box.
    j.geometry.computeBoundingBox();
    let bb = j.geometry.boundingBox;
    const dimX = bb.max.x - bb.min.x;
    const dimY = bb.max.y - bb.min.y;
    const dimZ = bb.max.z - bb.min.z;
    if (dimZ > dimY && dimZ > dimX) j.geometry.rotateX(-Math.PI / 2);
    else if (dimX > dimY && dimX > dimZ) j.geometry.rotateZ(Math.PI / 2);
    j.geometry.computeBoundingBox();
    bb = j.geometry.boundingBox;
    // Re-center after rotation so origin = mesh centroid
    const cy = (bb.max.y + bb.min.y) / 2;
    j.geometry.translate(-(bb.max.x + bb.min.x)/2, -cy, -(bb.max.z + bb.min.z)/2);
    j.geometry.computeBoundingBox();
    bb = j.geometry.boundingBox;
    const nh = bb.max.y - bb.min.y;
    const nr = Math.max(bb.max.x - bb.min.x, bb.max.z - bb.min.z) / 2;
    // Cap scale by tube fit — drum diameter must be ≤ 60% of tube diameter so 2 can pass side-by-side
    const maxRadiusInTube = TUBE.radius * 0.6;       // ~1.56 with radius 2.6
    const heightScale = 2.2 / nh;
    const radiusScale = maxRadiusInTube / nr;
    oildrumScale = Math.min(heightScale, radiusScale);
    oildrumHalfH = (nh / 2) * oildrumScale;
    oildrumRadius = nr * oildrumScale;
  }
  return { j: !!j, s: !!s, b: !!b, c: !!c };
}

// Static walls for both halves. Trapdoor = the floor segment of each half (kinematic so we can swing it).
function staticBox(x, y, z, hx, hy, hz) {

  const col = world.createCollider(RAPIER.ColliderDesc.cuboid(hx, hy, hz).setFriction(0.4).setRestitution(0.35), body);

// TRAPDOOR FLOORS — kinematic, hinged at outer edge
// Each trapdoor is a slab the size of one half-floor
class Trapdoor {
  constructor(side) {
    // side: -1 left, +1 right
    this.side = side;
    this.cx = side * BOX_W / 4;   // center X of slab
    this.hx = halfW;
    this.hz = halfD;
    this.y = 0;
    this.angle = 0;
    this.targetAngle = 0;
    this.openUntil = 0;
    this.pivotX = side * (BOX_W / 2); // hinge at outer wall
    this.body = world.createRigidBody(
      RAPIER.RigidBodyDesc.kinematicPositionBased().setTranslation(this.cx, this.y, 0)
    );
    this.col = world.createCollider(
      RAPIER.ColliderDesc.cuboid(this.hx, 0.1, this.hz).setFriction(0.6).setRestitution(0.2),
      this.body
    );
  }
  open(durationMs = 700) {
    this.targetAngle = this.side * Math.PI / 2.4; // swing down/outward
    this.openUntil = performance.now() + durationMs;
  }
  update(dt) {
    if (performance.now() > this.openUntil) this.targetAngle = 0;
    // simple lerp
    this.angle += (this.targetAngle - this.angle) * Math.min(1, dt * 6);
    // Rotate around pivot at outer X: compute translation + rotation
    // Slab center moves on an arc around pivotX
    const r = Math.abs(this.cx - this.pivotX); // = halfW
    const sgn = this.side;
    const newX = this.pivotX - sgn * r * Math.cos(this.angle);
    const newY = -r * Math.sin(Math.abs(this.angle));
    const q = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), -this.angle * sgn);
    this.body.setNextKinematicTranslation({ x: newX, y: newY, z: 0 });
    this.body.setNextKinematicRotation({ x: q.x, y: q.y, z: q.z, w: q.w });
    // Mirror visual
    if (this.mesh) {
      this.mesh.position.set(newX, newY, 0);
      this.mesh.quaternion.copy(q);
    }
  }
  attachVisual() {
    const g = new THREE.BoxGeometry(this.hx * 2, 0.2, this.hz * 2);
    const m = new THREE.MeshStandardMaterial({ color: 0x111118, roughness: 0.8, metalness: 0.2 });
    this.mesh = new THREE.Mesh(g, m);
    this.mesh.receiveShadow = true;
    scene.add(this.mesh);
  }
}

function basketballTexture(primary, secondary) {
  const c = document.createElement('canvas'); c.width = 1024; c.height = 512;
  const ctx = c.getContext('2d');
  // Base split: left half primary, right half secondary
  ctx.fillStyle = primary; ctx.fillRect(0, 0, 512, 512);
  ctx.fillStyle = secondary; ctx.fillRect(512, 0, 512, 512);
  // Panel seams
  ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 8;
  ctx.beginPath(); ctx.moveTo(0, 256); ctx.lineTo(1024, 256); ctx.stroke();
  for (let i = 0; i < 8; i++) {
    const x = (i / 8) * 1024;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 512); ctx.stroke();
  }
  ctx.lineWidth = 6;
  for (let i = 0; i < 8; i++) {
    const x = (i / 8) * 1024 + 64;
    ctx.beginPath();
    ctx.arc(x, 256, 110, 0, Math.PI * 2);
    ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function bitcoinCoinTexture(side) {
  // Flat coin face — gold field with bitcoin glyph
  const c = document.createElement('canvas'); c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');
  // Radial gold gradient
  const g = ctx.createRadialGradient(256, 200, 40, 256, 256, 256);
  g.addColorStop(0, '#fff6c2');
  g.addColorStop(0.5, '#f5c842');
  g.addColorStop(1, '#a17712');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(256, 256, 248, 0, Math.PI*2); ctx.fill();
  // Inner ring
  ctx.strokeStyle = 'rgba(80,50,0,0.5)'; ctx.lineWidth = 6;
  ctx.beginPath(); ctx.arc(256, 256, 210, 0, Math.PI*2); ctx.stroke();
  // Bitcoin ₿ glyph
  ctx.fillStyle = '#f7931a';
  ctx.font = '700 320px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('₿', 256, 270);
  // Subtle edge shadow
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 12;
  ctx.beginPath(); ctx.arc(256, 256, 246, 0, Math.PI*2); ctx.stroke();
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

function footballTexture(primary, secondary) {
  const c = document.createElement('canvas'); c.width = 512; c.height = 256;
  const ctx = c.getContext('2d');
  ctx.fillStyle = primary; ctx.fillRect(0, 0, 256, 256);
  ctx.fillStyle = secondary; ctx.fillRect(256, 0, 256, 256);
  // White laces in center stripe
  ctx.fillStyle = '#f8f8f0';
  ctx.fillRect(0, 116, 512, 24);
  ctx.fillStyle = '#0a0a0a';
  for (let i = 0; i < 12; i++) {
    const x = 40 + i * 36;
    ctx.fillRect(x, 122, 8, 12);
  }
  // Subtle pebble texture
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  for (let i = 0; i < 600; i++) {
    ctx.fillRect(Math.random()*512, Math.random()*256, 2, 2);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;

}

// Geometry per sport
const sphereGeom = new THREE.SphereGeometry(BALL_R, 28, 20);
const coinGeom = new THREE.CylinderGeometry(BALL_R * 0.95, BALL_R * 0.95, BALL_R * 0.35, 36);

// Collect all geometries shared with prototype assets — these must NOT be disposed per-instance
function isSharedGeometry(geom) {
  if (!geom) return true;
  if (geom === sphereGeom || geom === coinGeom) return true;
  if (geom === oildrumProto?.geometry) return true;
  if (geom === basketballProto?.geometry) return true;
  if (geom === bitcoinProto?.geometry) return true;
  if (geom === soccerProto?.geometry) return true;
  return false;
}

function disposeBallMesh(node) {
  if (Array.isArray(node.material)) {
    for (const m of node.material) { m.map?.dispose(); m.dispose(); }
  } else if (node.material && !isSharedMaterial(node.material)) {
    node.material.map?.dispose();
    node.material.dispose();
  }
  if (!isSharedGeometry(node.geometry)) node.geometry.dispose();
}
function isSharedMaterial(mat) {
  return mat === oildrumProto?.material
      || mat === basketballProto?.material
      || mat === soccerProto?.material;
}

function makeBallMesh(sport, primary, secondary) {
  if (sport === 'oil' && oildrumProto) {
    const mesh = oildrumProto.clone();
    mesh.geometry = oildrumProto.geometry;
    mesh.material = oildrumProto.material;
    mesh.scale.setScalar(oildrumScale);
    mesh.castShadow = true; mesh.receiveShadow = true;
    return mesh;
  }
  if (sport === 'soccer' && soccerProto) {
    const mesh = soccerProto.clone();
    mesh.geometry = soccerProto.geometry;
    mesh.material = soccerProto.material;
    mesh.scale.setScalar(soccerScale);
    mesh.castShadow = true; mesh.receiveShadow = true;
    return mesh;
  }
  if (sport === 'basketball' && basketballProto) {
    const mesh = basketballProto.clone();
    mesh.geometry = basketballProto.geometry;
    // Share the original material as-is; color comes from the top neon, no decals/logos.
    mesh.material = basketballProto.material;
    mesh.scale.setScalar(basketballScale);
    mesh.castShadow = true; mesh.receiveShadow = true;
    return mesh;
  }
  if (sport === 'crypto') {
    if (bitcoinProto) {
      const mesh = bitcoinProto.clone();
      mesh.geometry = bitcoinProto.geometry;
      // Clone material once to force-opacify the GLB defaults, but no team tint — neon does that
      const mat = bitcoinProto.material.clone();
      mat.transparent = false; mat.depthWrite = true; mat.alphaTest = 0;
      mesh.material = mat;
      mesh.scale.setScalar(bitcoinScale);
      mesh.castShadow = true; mesh.receiveShadow = true;
      return mesh;
    }
    // Fallback procedural cylinder
    const faceTex = bitcoinCoinTexture();
    const faceMat = new THREE.MeshStandardMaterial({ map: faceTex, metalness: 1.0, roughness: 0.25, emissive: 0x442200, emissiveIntensity: 0.15 });
    const sideMat = new THREE.MeshStandardMaterial({ color: 0xf5c842, metalness: 1.0, roughness: 0.35, emissive: 0x442200, emissiveIntensity: 0.1 });
    const mesh = new THREE.Mesh(coinGeom, [sideMat, faceMat, faceMat]);
    mesh.castShadow = true; mesh.receiveShadow = true;
    return mesh;
  }
  if (sport === 'football') {
    const geom = sphereGeom.clone();
    geom.scale(0.7, 0.7, 1.15);
    const tex = footballTexture(primary, secondary);
    const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.55, metalness: 0.05 });
    const mesh = new THREE.Mesh(geom, mat);
    mesh.castShadow = true; mesh.receiveShadow = true;
    return mesh;
  }
  // basketball fallback (procedural — only used before basketball.glb finishes loading)
  const tex = basketballTexture(primary, secondary);
  const mat = new THREE.MeshStandardMaterial({ map: tex, roughness: 0.55, metalness: 0.05 });
  const mesh = new THREE.Mesh(sphereGeom, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  return mesh;
}

// ─────────────────────────────────────────────────────────────────────
// BALL POOL — manages physics bodies + meshes per side
// ─────────────────────────────────────────────────────────────────────
class Side {
  constructor(idx, xCenter) {
    this.idx = idx;
    this.xCenter = xCenter;
    this.balls = []; // {body, mesh}
    this.primary = '#ffffff';
    this.secondary = '#000000';
    this.sport = 'basketball';
  }
  setStyle(sport, primary, secondary) {
    this.sport = sport;
    this.primary = primary;
    this.secondary = secondary;
  }
  spawnBall() {
    const r = BALL_R * (SIZE_MULT[this.sport] || 1.0);
    // Spawn INSIDE the funnel tube at the top — ball falls through the glass into the box
    const tubeInner = Math.max(0.1, TUBE.radius - r - 0.05);
    const a = Math.random() * Math.PI * 2;
    const rd = Math.random() * tubeInner * 0.7;
    const x = this.xCenter + Math.cos(a) * rd;
    const z = Math.sin(a) * rd;
    // Spawn ABOVE the ceiling so the ball appears to fall through it — hidden until it enters the tube
    const y = CEILING_Y + 1.0 + Math.random() * 0.6;
    // Higher damping for flat/stackable shapes prevents the micro-jitter you see on resting coins/cans
    const damp = (this.sport === 'crypto' || this.sport === 'oil')
      ? { lin: 0.45, ang: 0.85 }
      : { lin: 0.05, ang: 0.15 };
    const body = world.createRigidBody(
      RAPIER.RigidBodyDesc.dynamic()
        .setTranslation(x, y, z)
        .setLinearDamping(damp.lin)
        .setAngularDamping(damp.ang)
        .setCanSleep(true)
        // CCD disabled — too expensive at high body counts. Thicker walls + spawn margin prevent tunneling.
    );
    let colDesc;
    if (this.sport === 'football') {
      colDesc = RAPIER.ColliderDesc.capsule(BALL_R * 0.45, BALL_R * 0.6);
    } else if (this.sport === 'crypto') {
      const halfH = bitcoinProto ? bitcoinHalfHeight : BALL_R * 0.18;
      colDesc = RAPIER.ColliderDesc.cylinder(halfH, bitcoinRadius * 0.98);
    } else if (this.sport === 'oil') {
      // Cylinder collider matches the upright drum profile
      colDesc = RAPIER.ColliderDesc.cylinder(oildrumHalfH, oildrumRadius * 0.95);
    } else if (this.sport === 'soccer') {
      colDesc = RAPIER.ColliderDesc.ball(BALL_R * SIZE_MULT.soccer);
    } else if (this.sport === 'basketball') {
      colDesc = RAPIER.ColliderDesc.ball(BALL_R * SIZE_MULT.basketball);
    } else {
      colDesc = RAPIER.ColliderDesc.ball(BALL_R);
    }
    const friction = (this.sport === 'oil' || this.sport === 'crypto') ? 0.7 : 0.45;
    const restitution = (this.sport === 'oil' || this.sport === 'crypto') ? 0.1 : 0.55;
    colDesc.setRestitution(restitution).setFriction(friction).setDensity(1.2);
    world.createCollider(colDesc, body);
    const mesh = makeBallMesh(this.sport, this.primary, this.secondary);
    mesh.position.set(x, y, z);
    // Spawn animation — tiny → full size over ~280ms with ease-out cubic.
    // Physics body is full-size from the start; visual mismatch is invisible because the ball
    // is spawned high above the pile and reaches contact long after the tween finishes.
    mesh.userData.spawnT = 0;
    mesh.userData.targetScale = mesh.scale.x;
    mesh.scale.setScalar(mesh.userData.targetScale * 0.01);
    // Strong downward kick so balls drop fast through the tube — no growing-in-place feel
    body.setLinvel({ x: 0, y: -10, z: 0 }, true);
    // Spheres can tumble freely; coins + drums stay flat-oriented so they don't wedge sideways in the tube
    if (this.sport === 'soccer' || this.sport === 'football') {
      body.setAngvel({ x: (Math.random()-0.5)*4, y: (Math.random()-0.5)*4, z: (Math.random()-0.5)*4 }, true);
    }
    // No random orientation for crypto/oil — keep them upright so the tube doesn't jam
    scene.add(mesh);
    this.balls.push({ body, mesh });
  }
  removeRandomBalls(n) {
    // Mark them for removal — let physics keep them briefly so they fall out of trapdoor
    // We'll actually destroy them after they fall below y = -8
    n = Math.min(n, this.balls.length);
    // Already handled: trapdoor opens, balls fall, cleanup below handles removal
    // But we also want to limit pool — destroy the *highest* balls? No, gravity does it.
    // Returning n is fine.
    return n;
  }
  cleanupFallen() {
    for (let i = this.balls.length - 1; i >= 0; i--) {
      const b = this.balls[i];
      const t = b.body.translation();
      if (t.y < -10) {
        scene.remove(b.mesh);
        disposeBallMesh(b.mesh);
        world.removeRigidBody(b.body);
        this.balls.splice(i, 1);
      }
    }
  }
  rebuildAll() {
    for (const b of this.balls) {
      scene.remove(b.mesh);
      disposeBallMesh(b.mesh);
      world.removeRigidBody(b.body);
    }
    this.balls = [];
  }
  count() { return this.balls.length; }

const GAMMA = 'https://gamma-api.polymarket.com';

// Parse maybe-stringified array fields from Gamma
function parseArr(v) {
  if (Array.isArray(v)) return v;
  if (typeof v === 'string') { try { return JSON.parse(v); } catch { return []; } }
  return [];
}

// Heuristic: is this the moneyline market for a game?
function isMoneyline(market, eventTitle) {
  const q = (market.question || '').toLowerCase();
  if (/spread|o\/u|over\/under|first|quarter|half|total|points|assists|rebounds|mvp|td|touchdown|sack/.test(q)) return false;
  const outs = parseArr(market.outcomes).map(o => String(o).toLowerCase());
  if (outs.length !== 2) return false;
  if (outs.some(o => ['yes','no','over','under','draw'].includes(o))) return false;
  return true;
}

async function fetchMarkets() {
  const all = [];
  for (const f of SPORT_FILTERS) {
    try {
      const url = `${GAMMA}/events?closed=false&active=true&limit=80&tag_slug=${f.tag.toLowerCase()}&order=volume24hr&ascending=false`;
      const r = await fetch(url);
      const events = await r.json();
      for (const ev of events) {
        const title = ev.title || '';
        // Must be a head-to-head game ("Thunder vs. Spurs", "Chiefs vs Eagles")
        if (!/\bvs\.?\b/i.test(title)) continue;
        const ml = (ev.markets || []).find(m => isMoneyline(m, title));
        if (!ml) continue;
        const outcomes = parseArr(ml.outcomes);
        const prices = parseArr(ml.outcomePrices).map(Number);
        if (outcomes.length !== 2 || prices.length !== 2) continue;
        if (!prices.every(p => p > 0 && p < 1)) continue;
        all.push({
          id: ml.id,
          eventId: ev.id,
          question: ml.question,
          eventTitle: title,
          sport: f.sport,
          tag: f.tag,
          outcomes,
          prices,
          slug: ml.slug,
          endDate: ev.endDate,
          startDate: ev.startDate,
          volume: Number(ev.volume24hr || ev.volume || 0),
        });
      }
    } catch (e) { console.warn('Failed sport', f.tag, e); }
  }
  // Sort by volume desc
  all.sort((a, b) => b.volume - a.volume);
  return all;
}

async function fetchMarketOdds(id) {
  try {
    const r = await fetch(`${GAMMA}/markets/${id}`);
    const m = await r.json();
    const prices = parseArr(m.outcomePrices).map(Number);
    if (prices.length !== 2) return null;
    return prices;
  } catch { return null; }
}

function colorsFor(outcomeName) {

  let h = 0; for (let i = 0; i < k.length; i++) h = (h * 31 + k.charCodeAt(i)) | 0;
  const hue = Math.abs(h) % 360;
  return [`hsl(${hue}, 70%, 50%)`, `hsl(${(hue+30)%360}, 60%, 40%)`];
}

function hexToInt(c) {
  if (c.startsWith('#')) return parseInt(c.slice(1), 16);
  // hsl -> use canvas to resolve
  const cv = document.createElement('canvas'); cv.width=1; cv.height=1;
  const ctx = cv.getContext('2d'); ctx.fillStyle = c; ctx.fillRect(0,0,1,1);
  const d = ctx.getImageData(0,0,1,1).data;
  return (d[0]<<16) | (d[1]<<8) | d[2];
}

// Real Polymarket "X Up or Down" 5-min markets (auto-rotates every 5 min as new window opens)
async function fetchUpDownLive(asset /* 'Bitcoin' | ... */) {
  try {
    const r = await fetch(`${GAMMA}/events?closed=false&active=true&tag_slug=up-or-down&limit=200`);
    const arr = await r.json();
    const now = Date.now();
    // We want the LIVE moving market: prices off 50/50, soonest to resolve. Ignore future-pinned ones.
    const candidates = arr
      .filter(e => (e.title || '').toLowerCase().startsWith(asset.toLowerCase()))
      .filter(e => e.endDate && new Date(e.endDate).getTime() > now)
      .map(e => {
        const m = (e.markets || [])[0];
        const prices = m ? parseArr(m.outcomePrices).map(Number) : [];
        const moving = prices.length === 2 && Math.abs(prices[0] - 0.5) > 0.005;
        return { e, m, prices, moving, end: new Date(e.endDate).getTime() };
      })
      .filter(c => c.m && c.prices.length === 2 && c.moving);   // strict: only actually-moving events
    candidates.sort((a, b) => a.end - b.end); // soonest moving first
    const pick = candidates[0];
    if (!pick) return null;
    return {
      id: pick.m.id,
      eventId: pick.e.id,
      eventTitle: pick.e.title,
      sport: 'crypto',
      tag: asset.slice(0, 3).toUpperCase(),
      outcomes: parseArr(pick.m.outcomes),
      prices: pick.prices,
      endDate: pick.e.endDate,
      asset,
      isUpDown: true,
    };
  } catch (e) { console.warn('updown fetch', e); return null; }
}

      .filter(e => e.endDate && new Date(e.endDate).getTime() > now)
      .sort((a, b) => new Date(a.endDate) - new Date(b.endDate));
    if (!games.length) return null;

      if (!t) continue;

    const tA = teamYes[teamAName], tB = teamYes[teamBName];
    if (!tA || !tB) return null;

    const sum = tA.price + tB.price;

      eventTitle: ev.title,
      sport: 'soccer',
      tag: 'WC26',
      outcomes: [teamAName, teamBName],
      prices: [pA, pB],
      rawYes: [tA.price, tB.price],
      endDate: ev.endDate,
      startDate: ev.startDate,
      slug: ev.slug,
      isWorldCup: true,
    };
  } catch (e) { console.warn('wc fetch', e); return null; }

          if (prices.length === 2) teamYes[tName] = { price: prices[0], id: m.id };
        }
        let market = null;
        if (teamYes[teamA] && teamYes[teamB]) {
          const sum = teamYes[teamA].price + teamYes[teamB].price;
          const pA = sum > 0 ? teamYes[teamA].price / sum : 0.5;
          const pB = sum > 0 ? teamYes[teamB].price / sum : 0.5;
          market = {
            id: `${t.slug}-${e.id}`, eventId: e.id, eventTitle: e.title,
            sport: t.sport, tag: t.label,
            outcomes: [teamA, teamB], prices: [pA, pB],

          for (const m of (e.markets || [])) {
            const outs = parseArr(m.outcomes);
            const prices = parseArr(m.outcomePrices).map(Number);
            if (outs.length === 2 && prices.length === 2 &&
                outs.some(o => o.toLowerCase().includes(teamA.toLowerCase()) || o.toLowerCase().includes(teamB.toLowerCase()))) {
              market = {
                id: m.id, eventId: e.id, eventTitle: e.title,
                sport: t.sport, tag: t.label,
                outcomes: outs, prices, endDate: e.endDate,

              break;

          }
        }
        if (market) all.push({
          group: `${t.label} · UPCOMING`,
          tag: t.label,
          title: e.title,
          sub: e.endDate ? new Date(e.endDate).toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) : '',

  items.push({ group: 'LIVE FEEDS', tag: wcMarketStub.tag, title: wcMarketStub.eventTitle, market: wcMarketStub });
  // NBA + cached registry
  for (const r of marketRegistry) items.push(r);
  return items;
}

function filterList(query) {
  const all = buildBaseList();
  if (!query) return all;
  const q = query.toLowerCase();
  return all.filter(it => it.title.toLowerCase().includes(q) || it.tag.toLowerCase().includes(q));
}

// ── Ticker (embedded inside the scoreboard) — fetch related markets, render strip canvas, texture scrolls via UV offset
async function refreshTicker(sport) {
  if (!tickerSourceCanvas) return;
  const tagBySport = { soccer: 'soccer', basketball: 'nba', crypto: 'crypto', oil: 'sports' };
  const tag = tagBySport[sport] || 'sports';
  try {
    const url = `${GAMMA}/events?closed=false&active=true&tag_slug=${tag}&limit=80&order=volume24hr&ascending=false`;
    const arr = await (await fetch(url)).json();
    const now = Date.now();
    const items = [];
    for (const e of arr) {
      if (items.length >= 40) break;
      const title = e.title || '';
      if (!/\bvs\.?\b/i.test(title)) continue;
      if (e.endDate && new Date(e.endDate).getTime() < now) continue;
      const titleMatch = title.match(/^(.+?)\s+vs\.?\s+(.+)$/i);
      if (!titleMatch) continue;
      const teamA = titleMatch[1].trim();
      const teamB = titleMatch[2].trim();
      const teamYes = {};
      for (const m of (e.markets || [])) {
        const t = extractTeamFromWinQ(m.question || '');
        if (!t) continue;
        const px = parseArr(m.outcomePrices).map(Number);
        if (px.length === 2) teamYes[t] = px[0];
      }
      let pa = teamYes[teamA], pb = teamYes[teamB];
      if (pa == null || pb == null) {
        for (const m of (e.markets || [])) {
          const outs = parseArr(m.outcomes);
          const px = parseArr(m.outcomePrices).map(Number);
          if (outs.length === 2 && px.length === 2) { pa = px[0]; pb = px[1]; break; }
        }
      }
      if (pa == null || pb == null) continue;
      const sum = pa + pb;
      const pAn = sum > 0 ? pa/sum : 0.5;
      const pBn = sum > 0 ? pb/sum : 0.5;
      items.push({ teamA, teamB, pA: pAn, pB: pBn });
    }
    paintTickerStrip(items);
  } catch (e) { console.warn('ticker', e); }
}

function paintTickerStrip(items) {
  if (!tickerSourceCanvas || !items.length) return;
  // Bigger logical pixels in the strip → bigger on-screen text + better aspect ratio
  const ITEM_W = 900;
  const stripH = 200;
  const targetW = Math.max(1, items.length) * ITEM_W;
  if (tickerSourceCanvas.width !== targetW) tickerSourceCanvas.width = targetW;
  tickerSourceCanvas.height = stripH;
  const c = tickerSourceCanvas;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#040608';
  ctx.fillRect(0, 0, c.width, stripH);
  const itemOpts = { fontSize: 110, cell: 9, dotRadius: 3.6, weight: 700, color: '#e8eef6', offAlpha: 0.05 };
  for (let i = 0; i < items.length; i++) {
    const it = items[i];
    const x = i * ITEM_W;
    const txt = `${it.teamA.slice(0, 12).toUpperCase()} ${Math.round(it.pA*100)}%  ·  ${it.teamB.slice(0, 12).toUpperCase()} ${Math.round(it.pB*100)}%`;
    const cv = dotMatrixText(txt, itemOpts);
    const maxW = ITEM_W - 60;
    const s = Math.min(1, maxW / cv.width);
    ctx.drawImage(cv, x + 30, stripH/2 - (cv.height*s)/2, cv.width*s, cv.height*s);
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(x + ITEM_W - 4, 40, 2, stripH - 80);
  }
  tickerStripWidth = c.width;
  tickerStripHeight = c.height;
  if (tickerTex) {
    tickerTex.needsUpdate = true;
    tickerTex.repeat.x = tickerPlaneAspect / (tickerStripWidth / tickerStripHeight);
  }
}

async function loadMarkets() {
  const markets = await fetchMarkets();
  for (const m of markets) {
    marketRegistry.push({
      group: `${m.tag} · LIVE`,
      tag: m.tag,
      title: m.eventTitle || `${m.outcomes[0]} vs ${m.outcomes[1]}`,
      market: m,
    });
  }
  renderMarketList(buildBaseList());

  // Input wiring — clearing on focus so the FULL list is visible, restore on blur if nothing picked
  let debounceId;
  let stashedSelection = '';
  $input.addEventListener('focus', () => {
    stashedSelection = $input.value;
    $input.value = '';                // deselect: show all options
    $input.select();
    $dropdown.classList.add('open');
    renderMarketList(buildBaseList());
  });
  $input.addEventListener('blur', () => {
    // If user blurred without picking and input is empty, restore the previous selection
    setTimeout(() => {
      if ($input.value === '' && stashedSelection) $input.value = stashedSelection;
    }, 200); // delay so item-click handler runs first
  });
  $input.addEventListener('input', () => {
    const q = $input.value.trim();
    $dropdown.classList.add('open');
    const base = filterList(q);
    renderMarketList(base);
    if (debounceId) clearTimeout(debounceId);
    if (q.length >= 2) {
      // Inline loading row at the bottom while the API search is in flight
      const loadingEl = document.createElement('div');
      loadingEl.className = 'market-group-head';
      loadingEl.textContent = `SEARCHING POLYMARKET FOR "${q.toUpperCase()}"…`;
      loadingEl.style.color = '#8a93a3';
      $dropdown.appendChild(loadingEl);
      debounceId = setTimeout(async () => {
        const extras = await searchMatches(q);
        // Re-render with results
        renderMarketList([...filterList(q), ...extras]);
        if (!extras.length) {
          const noRes = document.createElement('div');
          noRes.className = 'market-group-head';
          noRes.textContent = `NO LIVE MATCHES FOR "${q.toUpperCase()}"`;
          $dropdown.appendChild(noRes);
        }
      }, 250);
    }
  });
  document.addEventListener('click', (e) => {
    if (!$picker.contains(e.target)) $dropdown.classList.remove('open');
  });

  // Default to first NBA event, else first item
  const firstNba = marketRegistry.find(r => r.tag === 'NBA');
  const def = firstNba || marketRegistry[0] || { market: btcMarketStub, title: btcMarketStub.eventTitle };
  $input.value = def.title;
  const m = await resolveStub(def.market);
  switchMarket(m);
}

async function switchMarket(market) {
  state.market = market;
  state.marketId = market.id;
  const [pA, pB] = market.prices;
  state.oddsA = pA; state.oddsB = pB;
  const cap = capacityFor(market.sport);
  state.targetA = Math.round(pA * cap);
  state.targetB = Math.round(pB * cap);
  state.lastA = state.targetA;
  state.lastB = state.targetB;

  let pAColor, sAColor, pBColor, sBColor;
  if (market.sport === 'crypto') {
    // Bitcoin orange both sides — distinguished by ⬆/⬇ icons + position, not by colors
    pAColor = '#f7931a'; sAColor = '#c46a00';
    pBColor = '#f7931a'; sBColor = '#c46a00';
  } else if (market.sport === 'oil') {
    // Yes (resolves) = green, No = red
    pAColor = '#00e676'; sAColor = '#00a050';
    pBColor = '#ff3b3b'; sBColor = '#8b0000';
  } else if (market.sport === 'soccer') {
    [pAColor, sAColor] = wcColorsFor(market.outcomes[0]);
    [pBColor, sBColor] = wcColorsFor(market.outcomes[1]);
  } else {
    [pAColor, sAColor] = colorsFor(market.outcomes[0]);
    [pBColor, sBColor] = colorsFor(market.outcomes[1]);
  }

  sideA.rebuildAll(); sideB.rebuildAll();
  sideA.setStyle(market.sport, pAColor, sAColor);
  sideB.setStyle(market.sport, pBColor, sBColor);

  // Color delivered by the top neon strip + its downward spotlight — frame stays chrome
  // Team identity = a subtle emissive tint on the chrome frame (anodized look). No interior color lights.
  halfA.frameMat.emissive.set(hexToInt(pAColor));
  halfA.frameMat.emissiveIntensity = 0.35;
  halfB.frameMat.emissive.set(hexToInt(pBColor));
  halfB.frameMat.emissiveIntensity = 0.35;
  refreshTicker(market.sport);
  // Stash colors for scoreboard reuse on poll updates
  state.colorA = typeof pAColor === 'string' ? pAColor : `#${pAColor.toString(16).padStart(6,'0')}`;
  state.colorB = typeof pBColor === 'string' ? pBColor : `#${pBColor.toString(16).padStart(6,'0')}`;
  updateScoreboard();

  setGhostText(market.outcomes[0], market.outcomes[1], hexToInt(pAColor), hexToInt(pBColor));
  setHud(market, pA, pB, 0, 0);

  // Initial fill
  fillInitial();
}

let fillIntervalId = null;
function fillInitial() {
  // Cancel any cascade still in progress from a previous switchMarket
  if (fillIntervalId !== null) { clearInterval(fillIntervalId); fillIntervalId = null; }
  let i = 0;
  const total = state.targetA + state.targetB;
  const seq = [];
  for (let k = 0; k < state.targetA; k++) seq.push('A');
  for (let k = 0; k < state.targetB; k++) seq.push('B');
  for (let k = seq.length - 1; k > 0; k--) { const j = (Math.random() * (k+1))|0; [seq[k], seq[j]] = [seq[j], seq[k]]; }
  fillIntervalId = setInterval(() => {
    if (i >= total) { clearInterval(fillIntervalId); fillIntervalId = null; return; }
    if (seq[i] === 'A') sideA.spawnBall();
    else sideB.spawnBall();
    i++;
  }, 60);
}

async function pollOdds() {
  if (!state.marketId) return;
  let prices;
  if (state.market.isUpDown) {
    const live = await fetchUpDownLive(state.market.asset);
    if (!live) return;
    if (live.id !== state.marketId) { await switchMarket(live); return; }
    prices = live.prices;
  } else if (state.market.isOilStrike) {
    prices = await fetchMarketOdds(state.marketId);
  } else if (state.market.isWorldCup) {
    const live = await fetchWorldCupLive();
    if (!live) return;
    if (live.eventId !== state.market.eventId
        || live.outcomes[0] !== state.market.outcomes[0]
        || live.outcomes[1] !== state.market.outcomes[1]) {
      await switchMarket(live); return;
    }
    prices = live.prices;
  } else if (state.market.isSoccerMatch) {
    // Re-fetch the event and recompute normalized team-Yes prices
    try {
      const r = await fetch(`${GAMMA}/events/${state.market.eventId}`);
      const ev = await r.json();
      const [teamAName, teamBName] = state.market.outcomes;
      let pa = null, pb = null;
      for (const m of (ev.markets || [])) {
        const t = extractTeamFromWinQ(m.question || '');
        if (!t) continue;
        const px = parseArr(m.outcomePrices).map(Number);
        if (px.length !== 2) continue;
        if (t === teamAName) pa = px[0];
        else if (t === teamBName) pb = px[0];
      }
      if (pa == null || pb == null) return;
      const sum = pa + pb;
      prices = sum > 0 ? [pa/sum, pb/sum] : [0.5, 0.5];
    } catch { return; }
  } else {
    prices = await fetchMarketOdds(state.marketId);
  }
  if (!prices) return;
  const [pA, pB] = prices;
  state.oddsA = pA; state.oddsB = pB;
  const cap = capacityFor(state.market.sport);
  const newA = Math.round(pA * cap);
  const newB = Math.round(pB * cap);

  const dA = newA - state.lastA;
  const dB = newB - state.lastB;

  // Apply changes
  applyDelta(sideA, trapL, dA);
  applyDelta(sideB, trapR, dB);

  state.lastA = newA;
  state.lastB = newB;

  setHud(state.market, pA, pB,
    (pA*100) - (state.market.prices[0]*100),
    (pB*100) - (state.market.prices[1]*100));
  $statusText.textContent = `Live · updated ${new Date().toLocaleTimeString()}`;
  updateScoreboard();

}
// Independent 5s churn timer — runs only when a BTC market is active
setInterval(() => { if (state.market?.isUpDown) churnBtc(); }, 5000);

// Cycle coins on each side: drop new ones in from above, silently retire the oldest already at rest.
// Doesn't touch the trapdoor (which drains the whole pile via gravity).
function churnBtc() {
  for (const side of [sideA, sideB]) {
    if (side.balls.length < 4) continue;
    const churn = 4;
    // Pick the bottom-most resting coins (lowest y) and queue them for silent removal
    const resting = side.balls
      .map((b, i) => ({ b, i, y: b.body.translation().y }))
      .filter(o => Math.abs(o.b.body.linvel().y) < 0.1) // already settled
      .sort((a, c) => a.y - c.y)
      .slice(0, churn);
    // Spawn new coins from the top first (so total temporarily exceeds target during cascade)
    for (let k = 0; k < churn; k++) setTimeout(() => side.spawnBall(), k * 110);
    // Despawn the old ones after the new ones have time to land
    setTimeout(() => {
      for (const o of resting) {
        const idx = side.balls.indexOf(o.b);
        if (idx === -1) continue;
        side.balls.splice(idx, 1);
        scene.remove(o.b.mesh); disposeBallMesh(o.b.mesh);
        world.removeRigidBody(o.b.body);
      }
    }, 1400);
  }
}

function applyDelta(side, trap, delta) {
  if (delta > 0) {
    // Add balls
    let added = 0;
    const adder = setInterval(() => {
      if (added >= delta) { clearInterval(adder); return; }
      side.spawnBall(); added++;
    }, 80);
  } else if (delta < 0) {
    trap.open(900);
    // Balls fall out via gravity; cleanupFallen() removes them
    // But we also need to bound: kill the lowest N balls by giving them y-velocity if floor doesn't reach
    // The trapdoor opening alone may not drop exactly |delta| balls — for v1 we accept that gravity drops "some" and we re-sync next tick
    // To be precise: pick |delta| balls and unghost them = lift very slightly to let them slide out, then on next tick the count corrects via additional removals
    // Simplest: after trapdoor opens, count current balls; if still > target after 1.5s, force-remove extras
    setTimeout(() => {
      const target = side === sideA ? state.lastA + delta : state.lastB + delta; // delta is negative
      while (side.balls.length > target) {
        const b = side.balls.pop();
        scene.remove(b.mesh);
        disposeBallMesh(b.mesh);
        world.removeRigidBody(b.body);
      }
      // If not enough on the field (e.g., still rolling down), spawn back to target as a safety
      while (side.balls.length < target) side.spawnBall();
    }, 1400);
  }
}

// ─────────────────────────────────────────────────────────────────────
// RENDER LOOP
// ─────────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
function loop() {
  const dt = Math.min(0.033, clock.getDelta());
  // Physics step
  world.step(eventQueue);
  // Trapdoors
  trapL.update(dt);
  trapR.update(dt);
  // Sync ball meshes
  const spawnRate = dt * 12; // 1/0.083s → ~80ms tween, near-instant
  for (const side of [sideA, sideB]) {
    for (const b of side.balls) {
      const t = b.body.translation();
      const r = b.body.rotation();
      b.mesh.position.set(t.x, t.y, t.z);
      b.mesh.quaternion.set(r.x, r.y, r.z, r.w);
      // Spawn-in scale tween (ease-out cubic)
      const ud = b.mesh.userData;
      if (ud.spawnT !== undefined && ud.spawnT < 1) {
        ud.spawnT = Math.min(1, ud.spawnT + spawnRate);
        const e = 1 - Math.pow(1 - ud.spawnT, 3);
        b.mesh.scale.setScalar(ud.targetScale * (0.01 + 0.99 * e));
      }
    }
    side.cleanupFallen();
  }
  // Camera tween (locked angles)
  if (camTweenT < 1) {
    camTweenT = Math.min(1, camTweenT + dt * 1.6);
    const e = camTweenT < 0.5 ? 2 * camTweenT * camTweenT : 1 - Math.pow(-2 * camTweenT + 2, 2) / 2;
    camera.position.lerpVectors(camFromPos, camToPos, e);
  }
  camera.lookAt(CAM_TARGET);
  // Ticker scroll via UV offset — cheap, no GPU re-upload
  if (tickerTex) tickerTex.offset.x = (performance.now() * 0.00006) % 1;
  composer.render();
  requestAnimationFrame(loop);
}

// Camera angle buttons
document.querySelectorAll('.cam-btn').forEach(b => {
  b.addEventListener('click', () => setCamera(parseInt(b.dataset.cam, 10)));
});
window.addEventListener('keydown', (e) => {
  if (e.key === '1') setCamera(0);
  if (e.key === '2') setCamera(1);
  if (e.key === '3') setCamera(2);
});


window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
});

// ─────────────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────────────
loop();
mountScoreboard();
window.__dbg = { scene, sideA: null, sideB: null, get protos(){ return { j: !!oildrumProto, s: !!soccerProto, b: !!basketballProto, c: !!bitcoinProto }; } };

// ── Real GSAP loader — tied to loading milestones, exits after first market is ready
const loader = (() => {
  if (typeof gsap === 'undefined') return { progress: () => {}, finish: () => { document.getElementById('loading').remove(); } };
  if (gsap.registerPlugin && typeof CustomEase !== 'undefined') gsap.registerPlugin(CustomEase, SplitText);
  if (typeof CustomEase !== 'undefined') CustomEase.create('loader', '0.65, 0.01, 0.05, 0.99');

  const wrap = document.querySelector('[data-load-wrap]');
  const bg = wrap.querySelector('[data-load-bg]');
  const progressBar = wrap.querySelector('[data-load-progress]');
  const logo = wrap.querySelector('[data-load-logo]');
  const container = wrap.querySelector('[data-load-container]');
  const textElements = Array.from(wrap.querySelectorAll('[data-load-text]'));
  const resetTargets = Array.from(wrap.querySelectorAll('[data-load-reset]:not([data-load-text])'));
  if (resetTargets.length) gsap.set(resetTargets, { autoAlpha: 1 });

  // Text cycle (split chars in/out)
  let firstWord, secondWord;
  if (textElements.length >= 2 && typeof SplitText !== 'undefined') {
    firstWord = new SplitText(textElements[0], { type: 'lines,chars', mask: 'lines' });
    secondWord = new SplitText(textElements[1], { type: 'lines,chars', mask: 'lines' });
    gsap.set([firstWord.chars, secondWord.chars], { autoAlpha: 0, yPercent: 125 });
    gsap.set(textElements, { autoAlpha: 1 });
    gsap.to(firstWord.chars, { autoAlpha: 1, yPercent: 0, duration: 0.4, stagger: { each: 0.015 }, ease: 'loader' });
  }

  let currentProgress = 0;
  let switchedText = false;
  function progress(p) {
    const v = Math.max(currentProgress, Math.min(1, p));
    currentProgress = v;
    gsap.to(progressBar, { scaleX: v, duration: 0.4, ease: 'loader' });
    // Halfway: swap text
    if (v >= 0.5 && !switchedText && firstWord && secondWord) {
      switchedText = true;
      gsap.to(firstWord.chars, { autoAlpha: 0, yPercent: -125, duration: 0.3, stagger: { each: 0.012 }, ease: 'loader' });
      gsap.to(secondWord.chars, { autoAlpha: 1, yPercent: 0, duration: 0.4, stagger: { each: 0.015 }, ease: 'loader' }, '<0.1');
    }
  }

  function finish() {
    // Run exit: full bar, then collapse, then bg slides up out of view
    const tl = gsap.timeline({ defaults: { ease: 'loader' } });
    tl.to(progressBar, { scaleX: 1, duration: 0.35 });
    tl.to(logo, { clipPath: 'inset(0% 0% 0% 0%)', duration: 0.35 }, '<');
    if (secondWord) tl.to(secondWord.chars, { autoAlpha: 0, yPercent: -125, duration: 0.25, stagger: { each: 0.012 } }, '<0.05');
    tl.to(container, { autoAlpha: 0, duration: 0.3 });
    tl.to(progressBar, { scaleX: 0, transformOrigin: 'right center', duration: 0.3 }, '<');
    tl.to(bg, { yPercent: -101, duration: 0.6 });
    tl.set(wrap, { display: 'none' });
  }
  return { progress, finish };
})();

loader.progress(0.15);

// Background asset load (40MB of GLB textures) — updates loader past 50% as they complete
loadAssetsBackground().then(() => {
  loader.progress(0.9);
  const s = state.market?.sport;
  if (s === 'oil' || s === 'basketball' || s === 'soccer' || s === 'crypto') switchMarket(state.market);
});

loader.progress(0.4);
await loadMarkets();
loader.progress(0.85);
// Give the first switchMarket a tick to populate the scene, then exit
setTimeout(() => loader.finish(), 250);
// Scoreboard repaint timer — so the middle cell (countdown/date) ticks live without waiting for the next odds poll
setInterval(() => { updateScoreboard(); }, 1000);

// Tighter polling for BTC (more lively), slower for sports markets
let lastPoll = 0;
setInterval(() => {
  const interval = state.market?.isUpDown ? 1500 : POLL_MS;
  if (performance.now() - lastPoll >= interval) {
    lastPoll = performance.now();
    pollOdds();
  }
}, 1000);
